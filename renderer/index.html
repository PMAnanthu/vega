  // ── AiChatPanel ──────────────────────────────────────────────────────────────
  function AiChatPanel({ messages, loading, onSend, onClose, onNewChat, configured }) {
    const [input, setInput] = useState('');
    const [histIdx, setHistIdx] = useState(-1);
    const bottomRef = useRef(null);
    const textareaRef = useRef(null);
    const userMsgs = messages.filter(m => m.role === 'user' && typeof m.content === 'string').map(m => m.content);

    useEffect(() => {
      bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
    }, [messages, loading]);

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submit();
        return;
      }
      if (e.key === 'ArrowUp' && !input) {
        e.preventDefault();
        const next = histIdx < userMsgs.length - 1 ? histIdx + 1 : histIdx;
        if (next !== histIdx) { setHistIdx(next); setInput(userMsgs[userMsgs.length - 1 - next]); }
        return;
      }
      if (e.key === 'ArrowDown' && histIdx >= 0) {
        e.preventDefault();
        const next = histIdx - 1;
        setHistIdx(next);
        setInput(next < 0 ? '' : userMsgs[userMsgs.length - 1 - next]);
      }
    }

    function submit() {
      const text = input.trim();
      if (!text || loading) return;
      setInput('');
      setHistIdx(-1);
      onSend(text);
      setTimeout(() => textareaRef.current?.focus(), 0);
    }

    return (
      <div className="fixed bottom-24 right-6 z-50 w-96 flex flex-col bg-white rounded-2xl shadow-2xl border border-gray-200 overflow-hidden"
           style={{ height: '520px' }}>
        {/* header */}
        <div className="shrink-0 flex items-center justify-between px-4 py-3 bg-indigo-600 text-white">
          <div className="flex items-center gap-2">
            <span className="text-lg font-bold">✦</span>
            <span className="font-semibold text-sm">Vega AI</span>
          </div>
          <div className="flex items-center gap-1">
            <button onClick={onNewChat} title="New chat"
              className="p-1.5 rounded-lg hover:bg-indigo-500 transition-colors text-indigo-200 hover:text-white">
              <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                <path d="M5.433 13.917l1.262-3.155A4 4 0 017.58 9.42l6.92-6.918a2.121 2.121 0 013 3l-6.92 6.918c-.383.383-.84.685-1.343.886l-3.154 1.262a.5.5 0 01-.65-.65z"/>
                <path d="M3.5 5.75c0-.69.56-1.25 1.25-1.25H10A.75.75 0 0010 3H4.75A2.75 2.75 0 002 5.75v9.5A2.75 2.75 0 004.75 18h9.5A2.75 2.75 0 0017 15.25V10a.75.75 0 00-1.5 0v5.25c0 .69-.56 1.25-1.25 1.25h-9.5c-.69 0-1.25-.56-1.25-1.25v-9.5z"/>
              </svg>
            </button>
            <button onClick={onClose} title="Close"
              className="p-1.5 rounded-lg hover:bg-indigo-500 transition-colors text-indigo-200 hover:text-white">
              <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/>
              </svg>
            </button>
          </div>
        </div>

        {/* messages */}
        <div className="flex-1 overflow-y-auto px-4 py-3 space-y-3 bg-gray-50">
          {messages.length === 0 && !loading && (
            <div className="flex flex-col items-center justify-center h-full text-center text-gray-400 px-4">
              <span className="text-4xl mb-3 opacity-30">✦</span>
              {configured
                ? <><div className="text-sm font-medium text-gray-500 mb-1">How can I help?</div>
                    <div className="text-xs">Ask me anything.</div></>
                : <><div className="text-sm font-medium text-gray-500 mb-1">Not configured</div>
                    <div className="text-xs">Go to Settings → AI Assistant and set your API Token and API URL.</div></>
              }
            </div>
          )}
          {messages.map((m, i) => (
            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
              {m.card?.type === 'bookmark'
                ? <div className="max-w-[85%] w-60"><BookmarkCard url={m.card.url} title={m.card.title} /></div>
                : <div className={`max-w-[85%] rounded-2xl px-3 py-2 text-sm ${
                    m.role === 'user'
                      ? 'bg-indigo-600 text-white rounded-br-sm'
                      : 'bg-white border border-gray-200 text-gray-800 rounded-bl-sm shadow-sm'
                  }`}>
                    {m.role === 'user'
                      ? <span className="whitespace-pre-wrap">{m.content}</span>
                      : <div className="md-preview prose-sm"
                          dangerouslySetInnerHTML={{ __html: marked.parse(m.content || '') }} />
                    }
                  </div>
              }
            </div>
          ))}
          {loading && (
            <div className="flex justify-start">
              <div className="bg-white border border-gray-200 rounded-2xl rounded-bl-sm px-4 py-2.5 shadow-sm">
                <div className="flex gap-1 items-center">
                  <span className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }} />
                  <span className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }} />
                  <span className="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }} />
                </div>
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>

        {/* input */}
        <div className="shrink-0 border-t border-gray-200 p-3 bg-white">
          <div className="flex items-end gap-2">
            <textarea ref={textareaRef} value={input} onChange={e => { setInput(e.target.value); setHistIdx(-1); }}
              onKeyDown={handleKey} rows={1} disabled={loading || !configured}
              placeholder={configured ? 'Message Vega AI…' : 'Configure API Token and URL in Settings first'}
              className="flex-1 resize-none border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed"
              style={{ maxHeight: '100px', overflowY: 'auto' }} />
            <button onClick={submit} disabled={!input.trim() || loading || !configured}
              className="shrink-0 w-9 h-9 flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-xl transition-colors">
              <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                <path d="M3.105 2.289a.75.75 0 00-.826.95l1.414 4.925A1.5 1.5 0 005.135 9.25h6.115a.75.75 0 010 1.5H5.135a1.5 1.5 0 00-1.442 1.086l-1.414 4.926a.75.75 0 00.826.95 28.896 28.896 0 0015.293-7.154.75.75 0 000-1.115A28.897 28.897 0 003.105 2.289z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── App ─────────────────────────────────────────────────────────────────────
  function App() {
    const [tasks, setTasks]           = useState([]);
    const [links, setLinks]           = useState([]);
    const [secrets, setSecrets]       = useState([]);
    const [ideas, setIdeas]           = useState([]);
    const [notes, setNotes]           = useState([]);
    const [folders, setFolders]       = useState([]);
    const [selectedNoteFolder, setSelectedNoteFolder] = useState(null);
    const [recurring, setRecurring]   = useState([]);
    const [loading, setLoading]       = useState(true);
    const [saveStatus, setSave]       = useState('');
    const [tab, setTab]               = useState(() => localStorage.getItem('vega-tab') || 'todo');

    // Persist active tab across refreshes
    const switchTab = (t) => { setTab(t); localStorage.setItem('vega-tab', t); };
    const [detailStack, setStack]     = useState([]);
    const [selectedNote, setNote]     = useState(null);
    const [dynamicViews, setDynamicViews]       = useState([]);
    const [activeDynamicView, setActiveDynamicView] = useState(null);
    const [todoTagFilter, setTodoTag] = useState('');
    const [sidebarCollapsed, setSidebarCollapsed] = useState(
      () => localStorage.getItem('vega-sidebar') === 'true'
    );
    const [settings, setSettings] = useState(() => {
      try { return JSON.parse(localStorage.getItem('vega-settings') || '{}'); } catch { return {}; }
    });
    const theme    = settings.theme    || 'light';
    const fontSize = settings.fontSize || 'medium';

    useEffect(() => {
      document.documentElement.classList.toggle('dark', theme === 'dark');
    }, [theme]);
    useEffect(() => {
      if (fontSize === 'medium') delete document.documentElement.dataset.fontsize;
      else document.documentElement.dataset.fontsize = fontSize;
    }, [fontSize]);

    function updateSettings(patch) {
      setSettings(prev => {
        const next = { ...prev, ...patch };
        localStorage.setItem('vega-settings', JSON.stringify(next));
        return next;
      });
    }
    function toggleSidebar() {
      setSidebarCollapsed(prev => {
        localStorage.setItem('vega-sidebar', String(!prev));
        return !prev;
      });
    }

    // ── AI chat state ──
    const [aiOpen,     setAiOpen]     = useState(false);
    const [aiMessages, setAiMessages] = useState([]);
    const [aiLoading,  setAiLoading]  = useState(false);

    useEffect(() => {
      fetch('/api/chat').then(r => r.json()).then(msgs => {
        if (!Array.isArray(msgs)) return;
        // Drop messages with non-string content (legacy tool-use format)
        const clean = msgs.filter(m => typeof m.content === 'string' && m.content.trim());
        if (clean.length > 0) setAiMessages(clean);
      }).catch(() => {});
    }, []);

    function saveAiMessages(msgs) {
      apiPost('/api/chat', msgs).catch(() => {});
    }

    async function handleAiSend(text) {
      const userMsg = { role: 'user', content: text };
      const next = [...aiMessages, userMsg];
      setAiMessages(next);
      setAiLoading(true);
      try {
        const res = await fetch('/api/ai/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: next,
            apiKey: settings.aiApiKey || '',
            model: settings.aiModel || 'claude-sonnet-4-6',
            apiUrl: settings.aiApiUrl || '',
          }),
        });
        const data = await res.json();
        if (data.error) {
          const errMsg = { role: 'assistant', content: '⚠ ' + data.error };
          const withErr = [...next, errMsg];
          setAiMessages(withErr);
          saveAiMessages(withErr);
        } else {
          const aiMsg = { role: 'assistant', content: data.reply || '…' };
          let finalMsgs = [...next, aiMsg];
          if (data.navigate) setTab(data.navigate);
          if (data.uiActions) {
            for (const action of data.uiActions) {
              if (action.type === 'open_task') {
                setStack([action.id]);
              } else if (action.type === 'open_note') {
                switchTab('notes');
                setNote(action.id);
              } else if (action.type === 'open_link') {
                openUrl(action.url);
                finalMsgs = [...finalMsgs, { role: 'assistant', content: '', card: { type: 'bookmark', url: action.url, title: action.title || action.url } }];
              } else if (action.type === 'show_dynamic_view') {
                const v = action.view;
                setDynamicViews(prev => [...prev.filter(x => x.id !== v.id), v]);
                setActiveDynamicView(v.id);
                switchTab('views');
              } else if (action.type === 'update_settings') {
                updateSettings(action.patch);
              }
            }
          }
          setAiMessages(finalMsgs);
          saveAiMessages(finalMsgs);
          if (data.changed) handleRefresh();
        }
      } catch (e) {
        const errMsg = { role: 'assistant', content: '⚠ Network error: ' + e.message };
        const withErr = [...next, errMsg];
        setAiMessages(withErr);
        saveAiMessages(withErr);
      }
      setAiLoading(false);
    }

    function handleAiNewChat() {
      setAiMessages([]);
      saveAiMessages([]);
    }

    function handleCloseView(id) {
      const next = dynamicViews.filter(v => v.id !== id);
      setDynamicViews(next);
      if (next.length === 0) switchTab('todo');
      else setActiveDynamicView(next[next.length - 1].id);
    }

    const taskTimer      = useRef(null);
    const linkTimer      = useRef(null);
    const secretTimer    = useRef(null);
    const ideaTimer      = useRef(null);
    const noteTimer      = useRef(null);
    const recurringTimer = useRef(null);
    const folderTimer    = useRef(null);
    const tasksReady     = useRef(false);
    const linksReady     = useRef(false);
    const secretsReady   = useRef(false);
    const ideasReady     = useRef(false);
    const notesReady     = useRef(false);
    const recurringReady = useRef(false);
    const foldersReady   = useRef(false);

    // load all
    useEffect(() => {
      Promise.all([fetchTasks(), fetchLinks(), fetchSecrets(), fetchIdeas(), fetchNotes(), fetchRecurring(), fetchFolders()]).then(([t, l, sec, ideas, n, r, fo]) => {
        const taskArr   = Array.isArray(t) ? t : [];
        const recurArr  = Array.isArray(r) ? r : [];
        const todayStr  = todayDate();
        const { newTasks, updatedRecurring } = generateRecurringTasks(recurArr, taskArr, todayStr);
        const allTasks      = (newTasks.length > 0 ? [...taskArr, ...newTasks] : taskArr)
          .map(t => { const s = t.status || (t.completed ? 'completed' : 'ready'); return { ...t, status: STATUS_REMAP[s] || s }; });
        const finalRecurring = newTasks.length > 0 ? updatedRecurring : recurArr;

        setTasks(allTasks);
        setLinks(Array.isArray(l) ? l : []);
        setSecrets(Array.isArray(sec) ? sec : []);
        setIdeas(Array.isArray(ideas) ? ideas : []);
        setNotes(Array.isArray(n) ? n : []);
        setFolders(Array.isArray(fo) ? fo : []);
        setRecurring(finalRecurring);
        setLoading(false);
        tasksReady.current     = true;
        linksReady.current     = true;
        secretsReady.current   = true;
        ideasReady.current     = true;
        notesReady.current     = true;
        recurringReady.current = true;
        foldersReady.current   = true;

        if (newTasks.length > 0) {
          postTasks(allTasks);
          postRecurring(finalRecurring);
        }
      });
    }, []);

    // debounced saves
    const debounceSave = (timerRef, readyRef, postFn, data) => {
      if (!readyRef.current) return;
      clearTimeout(timerRef.current);
      setSave('saving');
      timerRef.current = setTimeout(() => {
        postFn(data).then(() => setSave('saved')).catch(() => setSave('error'));
      }, 600);
    };
    useEffect(() => debounceSave(taskTimer, tasksReady, postTasks, tasks), [tasks]);
    useEffect(() => debounceSave(linkTimer, linksReady, postLinks, links), [links]);
    useEffect(() => debounceSave(secretTimer, secretsReady, postSecrets, secrets), [secrets]);
    useEffect(() => debounceSave(ideaTimer,   ideasReady,   postIdeas,   ideas),   [ideas]);
    useEffect(() => debounceSave(noteTimer, notesReady, postNotes, notes), [notes]);
    useEffect(() => debounceSave(recurringTimer, recurringReady, postRecurring, recurring), [recurring]);
    useEffect(() => debounceSave(folderTimer, foldersReady, postFolders, folders), [folders]);

    // ── task handlers ──
    const addTask = useCallback((title, parentId = null) => {
      const base = makeTask(title, parentId);
      setTasks(ts => {
        const parent = parentId ? ts.find(t => t.id === parentId) : null;
        const t = parent
          ? { ...base, type: parent.type || '', tags: [...(parent.tags || [])] }
          : base;
        return [...ts, t];
      });
      return base.id;
    }, []);
    const updateTask = useCallback((id, fields) => {
      setTasks(ts => {
        let updated = ts.map(t => t.id === id ? { ...t, ...fields } : t);

        // Propagate type/tags down to all descendants
        if ('type' in fields || 'tags' in fields) {
          const pushDown = (parentId, all) => {
            const children = all.filter(t => t.parentId === parentId);
            if (!children.length) return all;
            let result = all;
            for (const child of children) {
              const patch = {};
              if ('type' in fields) patch.type = fields.type;
              if ('tags' in fields) patch.tags = [...(fields.tags || [])];
              result = result.map(t => t.id === child.id ? { ...t, ...patch } : t);
              result = pushDown(child.id, result);
            }
            return result;
          };
          updated = pushDown(id, updated);
        }

        // Propagate actualTime and estimate sums up to ancestors
        if ('actualTime' in fields || 'estimate' in fields) {
          const propagate = (childId, field, all) => {
            const child = all.find(t => t.id === childId);
            if (!child?.parentId) return all;
            const parent = all.find(t => t.id === child.parentId);
            if (!parent) return all;
            const sum = all.filter(t => t.parentId === parent.id)
                           .reduce((s, t) => s + parseFloat(t[field] || 0), 0);
            const next = all.map(t => t.id === parent.id
              ? { ...t, [field]: sum > 0 ? String(Math.round(sum * 100) / 100) : '' }
              : t);
            return propagate(parent.id, field, next);
          };
          if ('actualTime' in fields) updated = propagate(id, 'actualTime', updated);
          if ('estimate'   in fields) updated = propagate(id, 'estimate',   updated);
        }

        return updated;
      });
    }, []);
    const completeTask   = useCallback((id) => setTasks(ts => ts.map(t => t.id === id ? { ...t, completed: true,  completedAt: new Date().toISOString() } : t)), []);
    const uncompleteTask = useCallback((id) => setTasks(ts => ts.map(t => t.id === id ? { ...t, completed: false, completedAt: null } : t)), []);
    const setTaskStatus  = useCallback((id, status) => setTasks(ts => ts.map(t => t.id === id
      ? { ...t, status,
          completed:   status === 'completed',
          completedAt: status === 'completed' ? (t.completedAt || new Date().toISOString()) : null,
          skippedAt:   status === 'skipped'   ? (t.skippedAt   || new Date().toISOString()) : null,
        }
      : t)), []);
    const deleteTask     = useCallback((id) => {
      const collect = (tid, all) => { const kids = all.filter(t => t.parentId === tid).map(t => t.id); return [tid, ...kids.flatMap(k => collect(k, all))]; };
      setTasks(ts => { const rm = new Set(collect(id, ts)); return ts.filter(t => !rm.has(t.id)); });
      setStack(s => s.filter(i => i !== id));
    }, []);
    const changePriority = useCallback((id, delta) =>
      setTasks(ts => ts.map(t => t.id !== id ? t : { ...t, priority: Math.min(5, Math.max(1, t.priority + delta)) })), []);

    // ── link handlers ──
    const addLink    = useCallback((data) => setLinks(ls => [{ ...makeLink(data.url, data.title), ...data }, ...ls]), []);
    const updateLink = useCallback((id, data) => setLinks(ls => ls.map(l => l.id === id ? { ...l, ...data } : l)), []);
    const deleteLink = useCallback((id) => setLinks(ls => ls.filter(l => l.id !== id)), []);

    // ── secret handlers ──
    const addSecret    = useCallback(() => setSecrets(ss => [makeSecret(), ...ss]), []);
    const updateSecret = useCallback((id, data) => setSecrets(ss => ss.map(s => s.id === id ? { ...s, ...data } : s)), []);
    const deleteSecret = useCallback((id) => setSecrets(ss => ss.filter(s => s.id !== id)), []);

    // ── idea handlers ──
    const addIdea    = useCallback(() => setIdeas(is => [makeIdea(), ...is]), []);
    const updateIdea = useCallback((id, data) => setIdeas(is => is.map(i => i.id === id ? { ...i, ...data, updatedAt: new Date().toISOString() } : i)), []);
    const deleteIdea = useCallback((id) => setIdeas(is => is.filter(i => i.id !== id)), []);
    const moveIdea   = useCallback((id, status) => setIdeas(is => is.map(i => i.id === id ? { ...i, status, updatedAt: new Date().toISOString() } : i)), []);

    // ── note handlers ──
    const addNote = useCallback((folderId = null) => {
      const n = makeNote(folderId);
      setNotes(ns => [n, ...ns]);
      setNote(n.id);
      switchTab('notes');
      return n.id;
    }, []);
    const updateNote = useCallback((id, fields) => setNotes(ns => ns.map(n => n.id === id ? { ...n, ...fields } : n)), []);
    const deleteNote = useCallback((id) => {
      setNotes(ns => ns.filter(n => n.id !== id));
      setNote(cur => cur === id ? null : cur);
    }, []);

    const addFolder = useCallback(() => {
      const f = makeFolder('New Folder');
      setFolders(fs => [...fs, f]);
      return f.id;
    }, []);
    const updateFolder = useCallback((id, fields) =>
      setFolders(fs => fs.map(f => f.id === id ? { ...f, ...fields } : f)), []);
    const deleteFolder = useCallback((id) => {
      setNotes(ns => ns.map(n => n.folderId === id ? { ...n, folderId: null } : n));
      setFolders(fs => fs.filter(f => f.id !== id));
      setSelectedNoteFolder(cur => cur === id ? null : cur);
    }, []);
    const moveNoteToFolder = useCallback((noteId, folderId) =>
      setNotes(ns => ns.map(n => n.id === noteId ? { ...n, folderId, updatedAt: new Date().toISOString() } : n)), []);

    // ── recurring handlers ──
    const addRecurring    = useCallback((data) => setRecurring(rs => [...rs, data]), []);
    const updateRecurring = useCallback((id, fields) => setRecurring(rs => rs.map(r => r.id === id ? { ...r, ...fields } : r)), []);
    const deleteRecurring = useCallback((id) => setRecurring(rs => rs.filter(r => r.id !== id)), []);
    const toggleRecurring = useCallback((id) => setRecurring(rs => rs.map(r => r.id === id ? { ...r, enabled: !r.enabled } : r)), []);

    // ── derived ──
    const rootTodos = useMemo(() =>
      tasks.filter(t => getStatus(t) === 'ready' && !t.parentId).sort((a, b) => {
        if (a.priority !== b.priority) return a.priority - b.priority;
        const ae = a.planEndDate || '9999-12-31';
        const be = b.planEndDate || '9999-12-31';
        return ae.localeCompare(be) || a.createdAt.localeCompare(b.createdAt);
      }), [tasks]);

    const allTaskTags   = useMemo(() => [...new Set(rootTodos.flatMap(t => t.tags || []))].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' })), [rootTodos]);
    const filteredTodos = useMemo(() =>
      todoTagFilter ? rootTodos.filter(t => (t.tags || []).includes(todoTagFilter)) : rootTodos,
    [rootTodos, todoTagFilter]);
    const completedRoots = useMemo(() => tasks.filter(t => getStatus(t) === 'completed' && !t.parentId), [tasks]);
    const skippedRoots   = useMemo(() =>
      tasks.filter(t => getStatus(t) === 'skipped' && !t.parentId)
           .sort((a, b) => (b.skippedAt || '').localeCompare(a.skippedAt || '')),
    [tasks]);
    const activeTasks    = useMemo(() =>
      tasks.filter(t => getStatus(t) === 'in_progress' && !t.parentId)
           .sort((a, b) => a.priority - b.priority || a.createdAt.localeCompare(b.createdAt)),
    [tasks]);
    const pausedTasks    = useMemo(() =>
      tasks.filter(t => getStatus(t) === 'paused' && !t.parentId)
           .sort((a, b) => a.priority - b.priority || a.createdAt.localeCompare(b.createdAt)),
    [tasks]);
    const sortedGroups   = useMemo(() => {
      const g = completedRoots.reduce((acc, t) => {
        let d = 'unknown';
        if (t.completedAt) {
          const dt = new Date(t.completedAt);
          d = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        }
        (acc[d] = acc[d] || []).push(t); return acc;
      }, {});
      return Object.entries(g).sort(([a], [b]) => b.localeCompare(a));
    }, [completedRoots]);

    const [doneSearch, setDoneSearch] = useState('');
    const [dayTypeFilter, setDayTypeFilter] = useState({});

    const toggleDayType = (date, type) =>
      setDayTypeFilter(f => ({ ...f, [date]: f[date] === type ? null : type }));

    const doneFilter = useMemo(() => {
      const q = doneSearch.trim().toLowerCase();
      if (!q) return null;
      const tagTerms  = q.match(/#(\S+)/g)?.map(t => t.slice(1)) || [];
      const textTerms = q.replace(/#\S+/g, '').trim().split(/\s+/).filter(Boolean);
      return (t) => {
        const tags = (t.tags || []).map(s => s.toLowerCase());
        if (tagTerms.length && !tagTerms.every(tt => tags.some(tg => tg.includes(tt)))) return false;
        if (textTerms.length) {
          const haystack = [t.title, t.description, t.type, ...(t.tags || [])].filter(Boolean).join(' ').toLowerCase();
          if (!textTerms.every(w => haystack.includes(w))) return false;
        }
        return true;
      };
    }, [doneSearch]);

    const activeNote   = notes.find(n => n.id === selectedNote) || null;
    const taskPanel    = detailStack.length > 0;
    const notePanel    = activeNote !== null && tab === 'notes';

    const PAGE_TITLES = { todo: 'To Do', active: 'In Progress', paused: 'Paused', done: 'Completed', calendar: 'Calendar', analysis: 'Analysis', sprint: 'Sprint View', notes: 'Notes', links: 'Bookmarks', secrets: 'Secrets', recurring: 'Recurring', idea: 'Ideas', design: 'Design', implementation: 'Implementation', released: 'Released', settings: 'Settings' };

    // ── new action per tab ──
    const handleNew = () => {
      if (tab === 'todo')        { const id = addTask(''); setStack([id]); }
      else if (tab === 'notes')  { addNote(selectedNoteFolder); }
    };

    // ── refresh ──
    const [refreshing, setRefreshing] = useState(false);
    const handleRefresh = useCallback(async () => {
      setRefreshing(true);
      tasksReady.current = false;
      linksReady.current = false;
      secretsReady.current = false;
      ideasReady.current   = false;
      notesReady.current = false;
      recurringReady.current = false;
      foldersReady.current = false;
      const [t, l, sec, ideasData, n, r, fo] = await Promise.all([fetchTasks(), fetchLinks(), fetchSecrets(), fetchIdeas(), fetchNotes(), fetchRecurring(), fetchFolders()]);
      setTasks(Array.isArray(t) ? t : []);
      setLinks(Array.isArray(l) ? l : []);
      setSecrets(Array.isArray(sec) ? sec : []);
      setIdeas(Array.isArray(ideasData) ? ideasData : []);
      setNotes(Array.isArray(n) ? n : []);
      setRecurring(Array.isArray(r) ? r : []);
      setFolders(Array.isArray(fo) ? fo : []);
      tasksReady.current = true;
      linksReady.current = true;
      secretsReady.current = true;
      ideasReady.current   = true;
      notesReady.current = true;
      recurringReady.current = true;
      foldersReady.current = true;
      setRefreshing(false);
    }, []);

    // ── Open file from Finder (macOS "Open With Vega" / .vega files) ──
    useEffect(() => {
      if (!window.electronAPI?.onOpenFile) return;
      window.electronAPI.onOpenFile(async (filePath) => {
        try {
          const result = await window.electronAPI.readFile(filePath);
          if (!result.ok) return;
          const n = makeNote(null);
          const newNote = { ...n, title: result.name || 'Imported Note', content: result.content };
          setNotes(ns => [newNote, ...ns]);
          setNote(newNote.id);
          switchTab('notes');
        } catch {}
      });
    }, []);

    // ── External change detection (MCP / other writers) ──
    // Poll /api/last-modified every 3 s; auto-refresh if a write came from outside this session.
    useEffect(() => {
      let lastTs = 0;
      // Initialise baseline after the first load settles
      const init = setTimeout(async () => {
        try { const r = await apiGet('/api/last-modified'); lastTs = r.ts || 0; } catch {}
      }, 2000);

      const interval = setInterval(async () => {
        try {
          const r = await apiGet('/api/last-modified');
          if (r.ts && r.ts > lastTs) {
            lastTs = r.ts;
            // Only refresh if no local write is currently debouncing (all ready flags set)
            if (tasksReady.current && ideasReady.current && notesReady.current && linksReady.current) {
              handleRefresh();
            }
          }
        } catch {}
      }, 3000);

      return () => { clearTimeout(init); clearInterval(interval); };
    }, [handleRefresh]);

    // ── run recurring now ──
    const [runMsg, setRunMsg] = useState('');
    const handleRunRecurring = useCallback(() => {
      const todayStr = todayDate();
      const { newTasks, updatedRecurring } = generateRecurringTasks(recurring, tasks, todayStr);
      if (newTasks.length > 0) {
        setTasks(ts => [...ts, ...newTasks]);
        setRecurring(updatedRecurring);
      }
      setRunMsg(newTasks.length > 0 ? `Created ${newTasks.length} task${newTasks.length !== 1 ? 's' : ''}` : 'Nothing to create');
      setTimeout(() => setRunMsg(''), 3000);
    }, [recurring, tasks]);

    if (loading) {
      return (
        <div className="flex h-full items-center justify-center bg-gray-50">
          <div className="text-center text-gray-400">
            <img src="/favicon.svg" alt="" className="w-12 h-12 mx-auto mb-4 opacity-60 animate-pulse" />
            <div className="text-sm">Loading Vega…</div>
          </div>
        </div>
      );
    }

    return (
      <div className="flex h-full overflow-hidden bg-gray-50">

        {/* ── Sidebar ── */}
        <Sidebar
          tab={tab} setTab={(t) => { switchTab(t); setStack([]); if (t !== 'notes') setNote(null); }}
          counts={{ todo: rootTodos.length, done: completedRoots.length + skippedRoots.length, active: activeTasks.length, paused: pausedTasks.length, notes: notes.length, links: links.length, secrets: secrets.length, recurring: recurring.length,
            idea: ideas.filter(i => i.status === 'idea').length,
            design: ideas.filter(i => i.status === 'design').length,
            implementation: ideas.filter(i => i.status === 'implementation').length,
            released: ideas.filter(i => i.status === 'released').length,
          }}
          saveStatus={saveStatus}
          collapsed={sidebarCollapsed}
          onToggle={toggleSidebar}
          dynamicViewCount={dynamicViews.length}
          featureFlags={{
            showSprintView: settings.showSprintView !== false,
            showNotes:      settings.showNotes      !== false,
            showBookmarks:  settings.showBookmarks  !== false,
            showSecrets:    settings.showSecrets    !== false,
            showFeatures:   settings.showFeatures   !== false,
          }}
        />

        {/* ── Main ── */}
        <div className="flex-1 flex flex-col min-w-0 overflow-hidden">

          {/* page header */}
          <div className="shrink-0 bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
            <h2 className="font-semibold text-gray-800 text-base">{PAGE_TITLES[tab]}</h2>
            <div className="flex items-center gap-2">
              <button onClick={handleRefresh} disabled={refreshing} title="Refresh data from server"
                className={`text-sm border border-gray-200 rounded-lg px-3 py-2 transition-colors ${refreshing ? 'text-gray-300 cursor-not-allowed' : 'text-gray-400 hover:text-gray-600 hover:border-gray-300'}`}>
                <span className={refreshing ? 'inline-block animate-spin' : ''}>↻</span>
              </button>
              {(tab === 'todo' || tab === 'notes') && (
                <button onClick={handleNew}
                  className="text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-colors shadow-sm">
                  {tab === 'todo' ? '+ New Task' : '+ New Note'}
                </button>
              )}
              {tab === 'secrets' && (
                <button onClick={addSecret}
                  className="text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-colors shadow-sm">
                  + New Secret
                </button>
              )}
              {/* Export / Import for Notes, Bookmarks, Ideas tabs */}
              {['notes','links','idea','design','implementation','released'].includes(tab) && (
                <>
                  <button onClick={async () => {
                    if (tab === 'notes') {
                      await exportData('vega-notes.json', { type: 'vega-notes', version: 1, exportedAt: new Date().toISOString(), data: notes });
                    } else if (tab === 'links') {
                      await exportData('vega-bookmarks.json', { type: 'vega-bookmarks', version: 1, exportedAt: new Date().toISOString(), data: links });
                    } else {
                      await exportData('vega-ideas.json', { type: 'vega-ideas', version: 1, exportedAt: new Date().toISOString(), data: ideas });
                    }
                  }} className="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-500 hover:text-indigo-600 hover:border-indigo-300 transition-colors">
                    ⬇ Export
                  </button>
                  <button onClick={async () => {
                    const res = await importData();
                    if (!res.ok || !res.data) return;
                    const d = res.data;
                    if (tab === 'notes' && d.type === 'vega-notes') {
                      const existingIds = new Set(notes.map(n => n.id));
                      const fresh = (d.data || []).filter(n => !existingIds.has(n.id)).map(n => ({ ...n, id: uid() }));
                      if (fresh.length) { setNotes(ns => [...ns, ...fresh]); alert('Imported ' + fresh.length + ' note(s)'); }
                      else alert('No new notes to import.');
                    } else if (tab === 'links' && d.type === 'vega-bookmarks') {
                      const existingUrls = new Set(links.map(l => l.url));
                      const fresh = (d.data || []).filter(l => !existingUrls.has(l.url)).map(l => ({ ...l, id: uid() }));
                      if (fresh.length) { setLinks(ls => [...ls, ...fresh]); alert('Imported ' + fresh.length + ' bookmark(s)'); }
                      else alert('No new bookmarks to import.');
                    } else if (['idea','design','implementation','released'].includes(tab) && d.type === 'vega-ideas') {
                      const existingIds = new Set(ideas.map(i => i.id));
                      const fresh = (d.data || []).filter(i => !existingIds.has(i.id)).map(i => ({ ...i, id: uid() }));
                      if (fresh.length) { setIdeas(is => [...is, ...fresh]); alert('Imported ' + fresh.length + ' idea(s)'); }
                      else alert('No new ideas to import.');
                    } else {
                      alert('File type does not match current tab.');
                    }
                  }} className="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-500 hover:text-indigo-600 hover:border-indigo-300 transition-colors">
                    ⬆ Import
                  </button>
                </>
              )}
            </div>
          </div>

          {/* scrollable content */}
          <div className="flex-1 overflow-y-auto">
            <div className={notePanel ? 'w-full h-full' : 'w-full px-6 py-6'}>

              {/* ── To Do ── */}
              {tab === 'todo' && (
                <div className="space-y-3">
                  {/* tag filter chips */}
                  {allTaskTags.length > 0 && (
                    <div className="flex flex-wrap gap-1.5">
                      {allTaskTags.map(t => (
                        <button key={t} onClick={() => setTodoTag(f => f === t ? '' : t)}
                          className={`text-xs px-2.5 py-0.5 rounded-full border transition-colors font-medium ${todoTagFilter === t ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-indigo-500 border-indigo-200 hover:border-indigo-400'}`}>
                          {t}
                        </button>
                      ))}
                    </div>
                  )}
                  <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    {filteredTodos.length === 0 && (
                      <div className="py-16 text-center text-gray-400">
                        <div className="text-5xl mb-3 opacity-20">✦</div>
                        <div className="text-sm">{rootTodos.length === 0 ? <>Nothing to do. Click <strong className="text-gray-500">+ New Task</strong> to start.</> : 'No tasks match this tag.'}</div>
                      </div>
                    )}
                    {filteredTodos.map(t => (
                      <TaskRow key={t.id} task={t} tasks={tasks} onSetStatus={setTaskStatus} onPriority={changePriority}
                        onOpen={id => setStack([id])} onDelete={deleteTask} settings={settings} />
                    ))}
                    <div className="border-t border-gray-100">
                      <AddInput parentId={null} onAdd={addTask} placeholder="Add task and press Enter…" />
                    </div>
                  </div>
                </div>
              )}

              {/* ── Completed ── */}
              {tab === 'done' && (() => {
                const filteredGroups = doneFilter
                  ? sortedGroups.map(([d, items]) => [d, items.filter(doneFilter)]).filter(([, items]) => items.length > 0)
                  : sortedGroups;
                const filteredSkipped = doneFilter ? skippedRoots.filter(doneFilter) : skippedRoots;
                const totalAct = completedRoots.reduce((s, t) => s + parseFloat(t.actualTime || 0), 0);
                const totalEst = completedRoots.reduce((s, t) => s + parseFloat(t.estimate   || 0), 0);
                const avgAct   = completedRoots.length > 0 ? totalAct / completedRoots.length : 0;
                return (
                <div className="space-y-4">
                  {/* summary bar */}
                  {completedRoots.length > 0 && (
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                      {[
                        { label: 'Tasks Done',    value: completedRoots.length,      color: 'text-green-600' },
                        { label: 'Actual Hours',  value: totalAct.toFixed(1) + 'h',  color: 'text-indigo-600' },
                        { label: 'Avg per Task',  value: avgAct > 0 ? avgAct.toFixed(1) + 'h' : '—', color: 'text-gray-700' },
                        { label: 'vs Estimate',
                          value: totalEst > 0 && totalAct > 0
                            ? (totalAct <= totalEst
                                ? `${((totalEst - totalAct) / totalEst * 100).toFixed(0)}% under`
                                : `${((totalAct - totalEst) / totalEst * 100).toFixed(0)}% over`)
                            : '—',
                          color: totalAct <= totalEst && totalEst > 0 ? 'text-green-600' : 'text-orange-500' },
                      ].map(k => (
                        <div key={k.label} className="bg-white rounded-xl border border-gray-200 px-4 py-3.5 text-center">
                          <div className={`text-xl font-bold ${k.color}`}>{k.value}</div>
                          <div className="text-xs text-gray-400 mt-0.5">{k.label}</div>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* search bar */}
                  <div className="relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-sm select-none">⌕</span>
                    <input
                      type="text"
                      value={doneSearch}
                      onChange={e => setDoneSearch(e.target.value)}
                      placeholder="Search by title, note, type or #tag…"
                      className="w-full text-sm border border-gray-200 rounded-xl pl-8 pr-8 py-2.5 bg-white focus:outline-none focus:border-indigo-400 placeholder-gray-300"
                    />
                    {doneSearch && (
                      <button onClick={() => setDoneSearch('')}
                        className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 hover:text-gray-500 text-xs">✕</button>
                    )}
                  </div>
                  {filteredGroups.length === 0 && filteredSkipped.length === 0 && (
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 py-16 text-center text-gray-400 text-sm">
                      {doneSearch ? 'No tasks match your search.' : 'No completed tasks yet.'}
                    </div>
                  )}
                  {filteredGroups.map(([date, items]) => {
                    const dayEst = items.reduce((s, t) => s + parseFloat(t.estimate   || 0), 0);
                    const dayAct = items.reduce((s, t) => s + parseFloat(t.actualTime || 0), 0);

                    // Build type breakdown for the day pie chart
                    const TYPE_COLORS = ['#6366f1','#f97316','#eab308','#10b981','#38bdf8','#e879f9','#f43f5e','#a3e635'];
                    const typeMap = {};
                    items.forEach(t => {
                      const k = t.type || '(no type)';
                      if (!typeMap[k]) typeMap[k] = { count: 0, act: 0, est: 0 };
                      typeMap[k].count++;
                      typeMap[k].act += parseFloat(t.actualTime || 0);
                      typeMap[k].est += parseFloat(t.estimate   || 0);
                    });
                    const typeEntries = Object.entries(typeMap).sort((a, b) => b[1].act - a[1].act);
                    const hasTypes = typeEntries.some(([k, v]) => k !== '(no type)' && v.act > 0);

                    const activeType = dayTypeFilter[date] || null;
                    const visibleItems = activeType ? items.filter(t => (t.type || '(no type)') === activeType) : items;

                    return (
                    <div key={date} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                      <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center gap-3 flex-wrap">
                        <span className="text-xs font-semibold text-gray-600 flex-1">{fmtDate(date)}</span>
                        <span className="text-xs text-gray-400">
                          {activeType ? `${visibleItems.length} of ${items.length}` : items.length} task{items.length !== 1 ? 's' : ''}
                          {activeType && <button onClick={() => toggleDayType(date, activeType)} className="ml-1.5 text-indigo-400 hover:text-indigo-600">✕</button>}
                        </span>
                        {dayAct > 0 && (
                          <span className="text-xs text-gray-400">
                            <span className="font-semibold text-indigo-600">{dayAct.toFixed(1)}h</span> actual
                          </span>
                        )}
                      </div>
                      {hasTypes && (
                        <div className="px-4 py-3 border-b border-gray-100 flex items-center gap-4">
                          <div className="w-16 h-16 shrink-0">
                            <ChartCanvas id={`pie-${date}`} config={{
                              type: 'doughnut',
                              data: {
                                labels: typeEntries.map(([k]) => k),
                                datasets: [{ data: typeEntries.map(([,v]) => v.act), backgroundColor: TYPE_COLORS.map((c, i) => activeType && typeEntries[i]?.[0] !== activeType ? c + '44' : c), borderWidth: 1, borderColor: '#fff' }],
                              },
                              options: {
                                responsive: true,
                                maintainAspectRatio: true,
                                cutout: '55%',
                                plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => {
                                  const [,v] = typeEntries[ctx.dataIndex];
                                  const pct = dayAct > 0 ? Math.round(v.act / dayAct * 100) : 0;
                                  return ` ${ctx.label}: ${v.act.toFixed(1)}h (${pct}%) · ${v.count} task${v.count !== 1 ? 's' : ''}`;
                                } } } },
                              },
                            }} onClick={i => toggleDayType(date, typeEntries[i][0])} />
                          </div>
                          <div className="flex flex-wrap gap-x-4 gap-y-1.5">
                            {typeEntries.map(([label, v], i) => {
                              const pct = dayAct > 0 ? Math.round(v.act / dayAct * 100) : 0;
                              const isActive = activeType === label;
                              const isDimmed = activeType && !isActive;
                              return (
                              <div key={label} onClick={() => toggleDayType(date, label)}
                                className={`flex items-center gap-1.5 cursor-pointer rounded px-1 -mx-1 transition-opacity ${isDimmed ? 'opacity-35' : ''}`}>
                                <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: TYPE_COLORS[i % TYPE_COLORS.length] }} />
                                <span className={`text-xs font-medium ${isActive ? 'text-indigo-600' : 'text-gray-700'}`}>{label}</span>
                                <span className="text-xs text-gray-400">{v.act > 0 ? `${v.act.toFixed(1)}h · ` : ''}{pct}% · {v.count}</span>
                              </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                      {visibleItems.map(t => (
                        <CompletedRow key={t.id} task={t} tasks={tasks} onSetStatus={setTaskStatus}
                          onOpen={id => setStack([id])} onDelete={deleteTask} />
                      ))}
                    </div>
                    );
                  })}

                  {filteredSkipped.length > 0 && (
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                      <div className="px-4 py-2.5 bg-gray-50 border-b border-gray-100 flex items-center gap-3">
                        <span className="text-xs font-semibold text-gray-500 flex-1">Skipped</span>
                        <span className="text-xs text-gray-400">{filteredSkipped.length} task{filteredSkipped.length !== 1 ? 's' : ''}</span>
                      </div>
                      {filteredSkipped.map(t => (
                        <CompletedRow key={t.id} task={t} tasks={tasks} onSetStatus={setTaskStatus}
                          onOpen={id => setStack([id])} onDelete={deleteTask} />
                      ))}
                    </div>
                  )}
                </div>
                );
              })()}

              {/* ── Active ── */}
              {tab === 'active' && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  {activeTasks.length === 0 && (
                    <div className="py-16 text-center text-gray-400">
                      <div className="text-5xl mb-3 opacity-20">▶</div>
                      <div className="text-sm">No in-progress tasks. Set a task status to In Progress.</div>
                    </div>
                  )}
                  {activeTasks.map(t => (
                    <TaskRow key={t.id} task={t} tasks={tasks} onSetStatus={setTaskStatus} onPriority={changePriority}
                      onOpen={id => setStack([id])} onDelete={deleteTask} settings={settings} />
                  ))}
                </div>
              )}

              {/* ── Paused ── */}
              {tab === 'paused' && (
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  {pausedTasks.length === 0 && (
                    <div className="py-16 text-center text-gray-400">
                      <div className="text-5xl mb-3 opacity-20">⏸</div>
                      <div className="text-sm">No blocked tasks.</div>
                    </div>
                  )}
                  {pausedTasks.map(t => (
                    <TaskRow key={t.id} task={t} tasks={tasks} onSetStatus={setTaskStatus} onPriority={changePriority}
                      onOpen={id => setStack([id])} onDelete={deleteTask} settings={settings} />
                  ))}
                </div>
              )}

              {/* ── Notes ── */}
              {tab === 'notes' && (
                activeNote
                  ? <NotePanel note={activeNote} onUpdate={updateNote} onClose={() => setNote(null)} onDelete={deleteNote} />
                  : <NotesTab notes={notes} folders={folders} selectedId={selectedNote}
                      selectedFolder={selectedNoteFolder}
                      onFolderSelect={setSelectedNoteFolder}
                      onSelect={id => setNote(id === selectedNote ? null : id)}
                      onDelete={deleteNote}
                      onAddFolder={addFolder}
                      onUpdateFolder={updateFolder}
                      onDeleteFolder={deleteFolder}
                      onMoveNote={moveNoteToFolder} />
              )}

              {/* ── Bookmarks ── */}
              {tab === 'links' && (
                <BookmarksTab links={links} onAdd={addLink} onUpdate={updateLink} onDelete={deleteLink} />
              )}

              {/* ── Secrets ── */}
              {tab === 'secrets' && (
                <SecretsTab secrets={secrets} links={links} onUpdate={updateSecret} onDelete={deleteSecret} />
              )}

              {/* ── Calendar ── */}
              {tab === 'calendar' && (
                <CalendarTab tasks={tasks} onOpen={id => setStack([id])} />
              )}

              {/* ── Analysis ── */}
              {tab === 'analysis' && (
                <AnalysisTab tasks={tasks} onOpenTask={id => setStack([id])} />
              )}

              {/* ── Sprint View ── */}
              {tab === 'sprint' && (
                <SprintViewTab tasks={tasks} onOpen={id => setStack([id])} />
              )}

              {/* ── Planning ── */}
              {['idea','design','implementation','released'].includes(tab) && (
                <PlanningTab
                  ideas={ideas}
                  onAdd={() => addIdea()}
                  onUpdate={updateIdea}
                  onDelete={deleteIdea}
                  onMove={moveIdea}
                  statusKey={tab}
                />
              )}

              {/* ── Recurring ── */}
              {tab === 'recurring' && (
                <RecurringTab
                  recurring={recurring}
                  onAdd={addRecurring}
                  onUpdate={updateRecurring}
                  onDelete={deleteRecurring}
                  onToggle={toggleRecurring}
                  onRun={handleRunRecurring}
                  runMsg={runMsg}
                />
              )}

              {/* ── Settings ── */}
              {tab === 'settings' && (
                <SettingsTab settings={settings} onUpdate={updateSettings} />
              )}

              {/* ── Dynamic Views ── */}
              {tab === 'views' && (
                <DynamicViewsTab
                  views={dynamicViews}
                  activeViewId={activeDynamicView}
                  onSelectView={setActiveDynamicView}
                  onCloseView={handleCloseView}
                  onOpenTask={id => setStack([id])}
                  onOpenNote={id => { switchTab('notes'); setNote(id); }}
                />
              )}

              {/* ── User Guide ── */}
              {tab === 'guide' && <UserGuideTab />}

              {/* ── About ── */}
              {tab === 'about' && <AboutTab />}

            </div>
          </div>
        </div>

        {/* ── Panels ── */}
        {taskPanel && (
          <div className="fixed inset-0 z-40 flex items-center justify-center p-8" style={{ backgroundColor: 'rgba(0,0,0,0.35)' }} onClick={() => setStack([])}>
            <div onClick={e => e.stopPropagation()} style={{ width: '80vw', height: '100%', maxHeight: 'calc(100vh - 4rem)' }}>
              <DetailPanel stack={detailStack} tasks={tasks} onClose={() => setStack([])}
                onUpdate={updateTask} onAddTask={addTask} onSetStatus={setTaskStatus}
                onDelete={deleteTask} settings={settings}
                onNavigate={id => setStack(s => [...s, id])} onBack={() => setStack(s => s.slice(0, -1))} />
            </div>
          </div>
        )}

        {/* ── AI Chat ── */}
        {aiOpen && (
          <AiChatPanel
            messages={aiMessages}
            loading={aiLoading}
            onSend={handleAiSend}
            onClose={() => setAiOpen(false)}
            onNewChat={handleAiNewChat}
            configured={!!(settings.aiApiKey && settings.aiApiUrl)}
          />
        )}

        {/* ── AI FAB ── */}
        <button onClick={() => setAiOpen(o => !o)}
          title="Vega AI"
          className={`fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-white transition-all hover:scale-105 ${aiOpen ? 'bg-indigo-700' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
          <svg className="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L13.09 8.26L19 6L14.74 10.91L21 12L14.74 13.09L19 18L13.09 15.74L12 22L10.91 15.74L5 18L9.26 13.09L3 12L9.26 10.91L5 6L10.91 8.26L12 2Z"/>
          </svg>
        </button>

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
