                      />
                      <button onClick={() => updateLink({ editing: false })}
                        className="shrink-0 text-xs text-indigo-500 hover:text-indigo-700 font-medium px-1">Done</button>
                      <button onClick={removeLink}
                        className="shrink-0 text-red-300 hover:text-red-500 text-xs">✕</button>
                    </div>
                  );
                }
                return (
                  <div key={lk.id || i} className="flex items-center gap-2 group">
                    {isUrl
                      ? <a href={lk.value} onClick={e => { e.preventDefault(); openUrl(lk.value); }}
                          className="text-sm text-indigo-600 hover:text-indigo-800 hover:underline truncate flex items-center gap-1">
                          {lk.name || lk.value}
                          <span className="text-xs opacity-60">↗</span>
                        </a>
                      : <span className="text-sm text-gray-700 truncate">{lk.name}{lk.value ? `: ${lk.value}` : ''}</span>
                    }
                    <button onClick={() => updateLink({ editing: true })}
                      className="shrink-0 text-xs text-gray-400 hover:text-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">✎</button>
                    <button onClick={removeLink}
                      className="shrink-0 text-red-300 hover:text-red-500 text-xs opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Sub-tasks */}
          <div>
            <div className="flex items-center justify-between mb-3">
              <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Sub-tasks</label>
              {allSubs.length > 0 && <span className="text-xs text-gray-400">{completedCount}/{allSubs.length} done</span>}
            </div>
            {allSubs.length === 0 && <p className="text-xs text-gray-400 mb-3">No sub-tasks yet.</p>}
            {ALL_STATUSES.map(s => {
              const group = subsByStatus[s];
              if (!group) return null;
              const cfg    = STATUS_CONFIG[s];
              const isOpen = !collapsedGroups.has(s);
              return (
                <div key={s} className="mb-1">
                  <button onClick={() => toggleGroup(s)}
                    className="w-full flex items-center gap-2 px-1 py-1 rounded hover:bg-gray-50 transition-colors text-xs font-medium text-gray-500 hover:text-gray-700">
                    <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${cfg.dot}`} />
                    <span className="flex-1 text-left">{cfg.label}</span>
                    <span className={`rounded-full px-1.5 py-0.5 min-w-4 text-center ${cfg.bg} ${cfg.text} border ${cfg.border}`}>{group.length}</span>
                    <span className="text-gray-300 text-xs w-3 text-center">{isOpen ? '▾' : '▸'}</span>
                  </button>
                  {isOpen && (
                    <div className="ml-1 mt-0.5">
                      {group.map(sub => (
                        <SubTaskRow key={sub.id} task={sub} tasks={tasks} onSetStatus={onSetStatus} onNavigate={onNavigate} onDelete={onDelete} settings={settings} />
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
            <div className="mt-2 -mx-5 border-t border-gray-100">
              <AddInput parentId={taskId} onAdd={onAddTask} placeholder="Add sub-task…" />
            </div>
          </div>

        </div>
      </div>
    );
  }

  // ── NoteCard ────────────────────────────────────────────────────────────────
  function NoteCard({ note, active, onClick, onDelete, draggable, onDragStart, onDragEnd }) {
    const preview = note.content.replace(/!\[.*?\]\(.*?\)/g, '').replace(/\n+/g, ' ').trim().slice(0, 160);
    return (
      <div className={`note-card group relative cursor-pointer rounded-xl border p-4 transition-all flex flex-col gap-2 ${active ? 'border-indigo-300 bg-indigo-50 shadow-sm' : 'border-gray-200 bg-white hover:border-gray-300 hover:shadow-sm'}`}
        draggable={draggable} onDragStart={onDragStart} onDragEnd={onDragEnd}
        onClick={onClick}>
        <div className="flex items-start justify-between gap-2">
          <div className="font-semibold text-sm text-gray-800 leading-snug line-clamp-2 flex-1">
            {note.title || <em className="text-gray-400 font-normal">Untitled</em>}
          </div>
          <button className="note-del shrink-0 text-red-300 hover:text-red-500 text-xs opacity-0 group-hover:opacity-100 transition-opacity"
            onClick={e => { e.stopPropagation(); onDelete(note.id); }}>✕</button>
        </div>
        {preview && <p className="text-xs text-gray-500 leading-relaxed line-clamp-3">{preview}</p>}
        <div className="flex items-center gap-2 flex-wrap mt-auto pt-1">
          <span className="text-xs text-gray-300">{fmtShort(note.updatedAt)}</span>
          {note.tags?.map(t => (
            <span key={t} className="text-xs bg-indigo-50 text-indigo-500 border border-indigo-100 px-1.5 py-0.5 rounded-full">{t}</span>
          ))}
        </div>
      </div>
    );
  }

  // ── JSON viewer ─────────────────────────────────────────────────────────────
  function JsonNode({ value, depth = 0 }) {
    const [collapsed, setCollapsed] = useState(depth > 2);
    if (value === null) return <span className="jv-null">null</span>;
    if (typeof value === 'boolean') return <span className="jv-bool">{value ? 'true' : 'false'}</span>;
    if (typeof value === 'number') return <span className="jv-num">{value}</span>;
    if (typeof value === 'string') return <span className="jv-str">"{value}"</span>;
    if (Array.isArray(value)) {
      if (value.length === 0) return <span className="text-gray-500">[]</span>;
      return (
        <span>
          <button className="jv-toggle" onClick={() => setCollapsed(c => !c)}>{collapsed ? '▶' : '▼'}</button>
          <span className="text-gray-500">[{collapsed ? <span className="text-gray-400 cursor-pointer" onClick={() => setCollapsed(false)}> {value.length} items </span> : null}{collapsed ? ']' : ''}</span>
          {!collapsed && (
            <div className="jv-children">
              {value.map((item, i) => (
                <div key={i} className="jv-row">
                  <span className="text-gray-400 text-xs mr-1" style={{minWidth:'1.5em'}}>{i}</span>
                  <span className="text-gray-400 mr-1">:</span>
                  <JsonNode value={item} depth={depth + 1} />
                  {i < value.length - 1 && <span className="text-gray-400">,</span>}
                </div>
              ))}
            </div>
          )}
          {!collapsed && <span className="text-gray-500">]</span>}
        </span>
      );
    }
    if (typeof value === 'object') {
      const keys = Object.keys(value);
      if (keys.length === 0) return <span className="text-gray-500">{'{}'}</span>;
      return (
        <span>
          <button className="jv-toggle" onClick={() => setCollapsed(c => !c)}>{collapsed ? '▶' : '▼'}</button>
          <span className="text-gray-500">{'{'}{collapsed ? <span className="text-gray-400 cursor-pointer" onClick={() => setCollapsed(false)}> {keys.length} keys </span> : null}{collapsed ? '}' : ''}</span>
          {!collapsed && (
            <div className="jv-children">
              {keys.map((k, i) => (
                <div key={k} className="jv-row flex-wrap">
                  <span className="jv-key">"{k}"</span>
                  <span className="text-gray-400 mx-1">:</span>
                  <JsonNode value={value[k]} depth={depth + 1} />
                  {i < keys.length - 1 && <span className="text-gray-400">,</span>}
                </div>
              ))}
            </div>
          )}
          {!collapsed && <span className="text-gray-500">{'}'}</span>}
        </span>
      );
    }
    return <span>{String(value)}</span>;
  }

  function JsonViewer({ content }) {
    const parsed = useMemo(() => {
      try { return { ok: true, value: JSON.parse(content) }; }
      catch (e) { return { ok: false, error: e.message }; }
    }, [content]);
    if (!parsed.ok) return (
      <div className="text-red-500 text-sm px-5 py-4 font-mono">
        <span className="font-semibold">Invalid JSON: </span>{parsed.error}
      </div>
    );
    return (
      <div className="json-viewer flex-1 overflow-y-auto px-5 py-4 text-gray-700">
        <JsonNode value={parsed.value} depth={0} />
      </div>
    );
  }

  // ── NotePanel ───────────────────────────────────────────────────────────────
  const NOTE_LANGUAGES = [
    { value: 'markdown',   label: 'Markdown' },
    { value: 'plain',      label: 'Plain Text' },
    { value: 'javascript', label: 'JavaScript' },
    { value: 'typescript', label: 'TypeScript' },
    { value: 'python',     label: 'Python' },
    { value: 'java',       label: 'Java' },
    { value: 'sql',        label: 'SQL' },
    { value: 'html',       label: 'HTML' },
    { value: 'css',        label: 'CSS' },
    { value: 'json',       label: 'JSON' },
    { value: 'yaml',       label: 'YAML' },
    { value: 'bash',       label: 'Bash' },
    { value: 'xml',        label: 'XML' },
  ];

  function NotePanel({ note, onUpdate, onClose, onDelete }) {
    if (!note) return null;
    const lang = note.language || 'markdown';
    const isMarkdown = lang === 'markdown';
    const isJson = lang === 'json';
    const [preview, setPreview]     = useState(isMarkdown && !!note.content);
    const [jsonView, setJsonView]   = useState(false);
    const [showAtt, setShowAtt]     = useState(false);
    const previewRef = useRef(null);
    const taRef      = useRef(null);
    const gutterRef  = useRef(null);
    const wordCount  = note.content.split(/\s+/).filter(Boolean).length;
    const html = useMemo(() => (isMarkdown && preview) ? marked.parse(note.content || '') : '', [isMarkdown, preview, note.content]);

    // When language changes to non-markdown, exit preview mode
    useEffect(() => {
      if (!isMarkdown) setPreview(false);
    }, [isMarkdown]);

    // Reset json view when switching away from json
    useEffect(() => {
      if (!isJson) setJsonView(false);
    }, [isJson]);

    function prettifyContent() {
      if (isJson) {
        try {
          const formatted = JSON.stringify(JSON.parse(note.content), null, 2);
          onUpdate(note.id, { content: formatted, updatedAt: new Date().toISOString() });
        } catch { /* invalid json, ignore */ }
        return;
      }
      if (lang === 'html' || lang === 'xml') {
        // Basic indent: insert newlines after tags
        try {
          let indent = 0;
          const lines = note.content
            .replace(/>\s*</g, '>\n<')
            .split('\n')
            .map(line => {
              line = line.trim();
              if (!line) return '';
              if (line.match(/^<\//) || line.match(/^\/>/)) indent = Math.max(0, indent - 1);
              const result = '  '.repeat(indent) + line;
              if (line.match(/^<[^/!?][^>]*[^/]>$/) && !line.match(/^<[a-z].*>.*<\/[a-z].*>$/i)) indent++;
              return result;
            });
          onUpdate(note.id, { content: lines.filter((l, i) => l || (lines[i - 1] !== '')).join('\n'), updatedAt: new Date().toISOString() });
        } catch { /* ignore */ }
        return;
      }
    }

    const canPrettify = isJson || lang === 'html' || lang === 'xml';


    // Line numbers
    const lineCount = (note.content || '').split('\n').length;
    const syncGutterScroll = () => {
      if (taRef.current && gutterRef.current) {
        gutterRef.current.scrollTop = taRef.current.scrollTop;
      }
    };

    const insertIntoNote = useCallback(text => {
      const ta = taRef.current;
      if (!ta) {
        const cur = note.content || '';
        onUpdate(note.id, { content: cur + (cur ? '\n\n' : '') + text, updatedAt: new Date().toISOString() });
        return;
      }
      const start = ta.selectionStart;
      const newContent = note.content.slice(0, start) + text + note.content.slice(ta.selectionEnd);
      onUpdate(note.id, { content: newContent, updatedAt: new Date().toISOString() });
      setTimeout(() => { ta.focus(); ta.setSelectionRange(start + text.length, start + text.length); }, 0);
    }, [note.id, note.content, onUpdate]);

    async function uploadAndInsert(file) {
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
          const r = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: safe, data: e.target.result }),
          });
          const { url } = await r.json();
          const ta = taRef.current;
          const ins = `![${file.name}](${url})`;
          const start = ta ? ta.selectionStart : (note.content || '').length;
          const cur = note.content || '';
          const newContent = cur.slice(0, start) + ins + cur.slice(ta ? ta.selectionEnd : start);
          onUpdate(note.id, { content: newContent, updatedAt: new Date().toISOString() });
          setTimeout(() => { if (ta) { ta.focus(); ta.setSelectionRange(start + ins.length, start + ins.length); } }, 0);
        } catch { /* ignore */ }
      };
      reader.readAsDataURL(file);
    }

    function handlePaste(e) {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) { e.preventDefault(); uploadAndInsert(item.getAsFile()); return; }
      }
    }

    const noteContentRef = useRef(note.content);
    useEffect(() => { noteContentRef.current = note.content; }, [note.content]);

    useEffect(() => {
      if (!preview || !previewRef.current) return;
      previewRef.current.querySelectorAll('pre').forEach(pre => {
        if (pre.querySelector('.copy-btn')) return;
        const btn = document.createElement('button');
        btn.textContent = 'Copy';
        btn.className = 'copy-btn';
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(pre.querySelector('code')?.innerText || pre.innerText);
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
        });
        pre.style.position = 'relative';
        pre.appendChild(btn);
      });
      addImageSizeControls(
        previewRef.current,
        () => noteContentRef.current,
        newVal => onUpdate(note.id, { content: newVal, updatedAt: new Date().toISOString() })
      );
      if (typeof mermaid !== 'undefined' && previewRef.current.querySelector('.mermaid')) {
        mermaid.run({ nodes: previewRef.current.querySelectorAll('.mermaid') });
      }
    }, [preview, html]);

    return (
      <div className="slide-panel w-full h-full bg-white flex flex-col overflow-hidden">
        {/* header */}
        <div className="shrink-0 px-5 pt-4 pb-3 border-b border-gray-100">
          <div className="flex items-center gap-2 mb-2">
            <button onClick={onClose}
              className="shrink-0 flex items-center gap-1 text-sm text-gray-400 hover:text-indigo-600 transition-colors mr-1">
              ← Notes
            </button>
            <input
              className="flex-1 font-bold text-gray-900 text-lg bg-transparent outline-none placeholder-gray-300 leading-snug"
              value={note.title}
              onChange={e => onUpdate(note.id, { title: e.target.value })}
              placeholder="Note title"
            />
            {/* language selector */}
            <select
              value={lang}
              onChange={e => onUpdate(note.id, { language: e.target.value })}
              className="shrink-0 text-xs border border-gray-200 rounded-md px-2 py-1 bg-white text-gray-600 outline-none focus:border-indigo-400 transition-colors cursor-pointer">
              {NOTE_LANGUAGES.map(l => <option key={l.value} value={l.value}>{l.label}</option>)}
            </select>
            {/* edit / preview toggle — only for markdown */}
            {isMarkdown && (
              <div className="flex shrink-0 bg-gray-100 rounded-md p-0.5 text-xs font-medium">
                <button onClick={() => setPreview(false)}
                  className={`px-2.5 py-1 rounded transition-colors ${!preview ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>
                  Edit
                </button>
                <button onClick={() => setPreview(true)}
                  className={`px-2.5 py-1 rounded transition-colors ${preview ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>
                  Preview
                </button>
              </div>
            )}
            {/* json: view toggle + prettify */}
            {isJson && (
              <div className="flex shrink-0 bg-gray-100 rounded-md p-0.5 text-xs font-medium">
                <button onClick={() => setJsonView(false)}
                  className={`px-2.5 py-1 rounded transition-colors ${!jsonView ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>
                  Raw
                </button>
                <button onClick={() => setJsonView(true)}
                  className={`px-2.5 py-1 rounded transition-colors ${jsonView ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400 hover:text-gray-600'}`}>
                  Tree
                </button>
              </div>
            )}
            {/* prettify button for json / html / xml */}
            {canPrettify && (
              <button onClick={prettifyContent}
                title="Prettify / format"
                className="shrink-0 text-xs border border-gray-200 hover:border-indigo-300 rounded-md px-2 py-1 text-gray-500 hover:text-indigo-600 transition-colors">
                {isJson ? '{ }' : '⌥'} Format
              </button>
            )}
            {/* image upload */}
            <label className="shrink-0 cursor-pointer text-gray-400 hover:text-indigo-500 transition-colors" title="Upload image (or paste a screenshot into the editor)">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
                <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
                <path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"/>
              </svg>
              <input type="file" accept="image/*" className="hidden" onChange={e => e.target.files[0] && uploadAndInsert(e.target.files[0])} />
            </label>
            <button onClick={() => { onDelete(note.id); onClose(); }}
              className="shrink-0 text-xs text-red-400 hover:text-red-600 border border-red-200 hover:border-red-300 rounded-md px-2 py-1 transition-colors">
              Delete
            </button>
          </div>
          <TagChips
            tags={note.tags || []}
            onChange={tags => onUpdate(note.id, { tags })}
            placeholder="Add tags…"
          />
        </div>

        {/* attachments (collapsible) */}
        <div className="shrink-0 border-b border-gray-100">
          <button className="w-full flex items-center justify-between px-5 py-2 text-xs font-medium text-gray-500 hover:bg-gray-50 transition-colors"
            onClick={() => setShowAtt(a => !a)}>
            <span className="uppercase tracking-wide">Attachments</span>
            <span className="text-gray-400">{showAtt ? '▲' : '▼'}</span>
          </button>
          {showAtt && (
            <div className="px-5 pb-4">
              <AttachmentsPanel entityId={note.id} entityType="note" onInsert={insertIntoNote} />
            </div>
          )}
        </div>

        {/* content */}
        <div className="flex-1 overflow-hidden flex flex-col">
          {isMarkdown && preview ? (
            <div className="flex-1 overflow-y-auto px-5 py-4">
              {note.content
                ? <div ref={previewRef} className="md-preview text-sm text-gray-700" dangerouslySetInnerHTML={{ __html: html }} />
                : <p className="text-sm text-gray-300 italic">Nothing to preview.</p>
              }
            </div>
          ) : isJson && jsonView ? (
            <JsonViewer content={note.content} />
          ) : (
            <div className="flex-1 overflow-hidden flex" style={{ fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace', fontSize: '13px', lineHeight: '1.6' }}>
              {/* line numbers gutter */}
              <div
                ref={gutterRef}
                className="shrink-0 select-none overflow-hidden text-right bg-gray-50 border-r border-gray-100"
                style={{ width: `${Math.max(String(lineCount).length + 1, 3)}ch`, paddingTop: '1rem', paddingBottom: '1rem', paddingRight: '0.5rem', paddingLeft: '0.25rem', color: '#9ca3af', lineHeight: '1.6', fontSize: '13px' }}>
                {Array.from({ length: lineCount }, (_, i) => (
                  <div key={i}>{i + 1}</div>
                ))}
              </div>
              {/* editor */}
              <textarea
                ref={taRef}
                className="flex-1 text-gray-700 resize-none outline-none bg-white"
                style={{ padding: '1rem 1.25rem', lineHeight: '1.6', fontSize: '13px', minHeight: '100%' }}
                value={note.content}
                onChange={e => onUpdate(note.id, { content: e.target.value, updatedAt: new Date().toISOString() })}
                onScroll={syncGutterScroll}
                onPaste={handlePaste}
                placeholder={isMarkdown ? "Start writing… (Markdown supported)\n\n# Heading\n**bold**, *italic*, `code`\n- list item" : `Start writing…`}
                spellCheck={lang === 'markdown' || lang === 'plain'}
              />
            </div>
          )}
        </div>

        {/* footer */}
        <div className="shrink-0 px-5 py-3 border-t border-gray-100 flex items-center justify-between text-xs text-gray-400">
          <span>Updated {fmtDate(note.updatedAt.split('T')[0])}</span>
          <div className="flex items-center gap-3">
            <span className="text-gray-300">{NOTE_LANGUAGES.find(l => l.value === lang)?.label || 'Markdown'}</span>
            <span>{wordCount} word{wordCount !== 1 ? 's' : ''} · {lineCount} line{lineCount !== 1 ? 's' : ''}</span>
          </div>
        </div>
      </div>
    );
  }

  // ── NotesTab ────────────────────────────────────────────────────────────────
  function NotesTab({ notes, folders, selectedId, selectedFolder, onFolderSelect, onSelect, onDelete, onAddFolder, onUpdateFolder, onDeleteFolder, onMoveNote }) {
    const [search, setSearch]         = useState('');
    const [filterTag, setFilter]      = useState('');
    const [renamingId, setRenamingId] = useState(null);
    const [renameVal, setRenameVal]   = useState('');
    const [dragOverId, setDragOverId] = useState(undefined);
    const [draggingNote, setDragging] = useState(null);
    const renameRef = useRef(null);

    useEffect(() => {
      if (renamingId !== null && renameRef.current) {
        renameRef.current.focus();
        renameRef.current.select();
      }
    }, [renamingId]);

    const isFiltering = !!(search || filterTag);

    const allTags = useMemo(() =>
      [...new Set(notes.flatMap(n => n.tags || []))].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' })), [notes]);

    const filtered = useMemo(() => {
      let arr = notes;
      if (!isFiltering && selectedFolder !== null) arr = arr.filter(n => n.folderId === selectedFolder);
      if (filterTag) arr = arr.filter(n => (n.tags || []).includes(filterTag));
      if (search)    arr = arr.filter(n =>
        (n.title + n.content + (n.tags || []).join(' ')).toLowerCase().includes(search.toLowerCase()));
      return arr.sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));
    }, [notes, search, filterTag, selectedFolder, isFiltering]);

    const countFor = (fid) => notes.filter(n => n.folderId === fid).length;

    const commitRename = () => {
      if (renamingId && renameVal.trim()) onUpdateFolder(renamingId, { name: renameVal.trim() });
      setRenamingId(null);
    };

    const startAdd = () => {
      const id = onAddFolder();
      setRenamingId(id);
      setRenameVal('New Folder');
    };

    const handleDragStart = (e, noteId) => {
      e.dataTransfer.effectAllowed = 'move';
      setDragging(noteId);
    };
    const handleDragEnd   = () => { setDragging(null); setDragOverId(undefined); };
    const handleDragOver  = (e, fid) => { e.preventDefault(); setDragOverId(fid); };
    const handleDragLeave = (e) => { if (!e.currentTarget.contains(e.relatedTarget)) setDragOverId(undefined); };
    const handleDrop      = (e, fid) => {
      e.preventDefault();
      if (draggingNote !== null) onMoveNote(draggingNote, fid);
      setDragging(null); setDragOverId(undefined);
    };

    const folderCls = (fid, isActive) => {
      const drag = dragOverId === fid;
      const base = 'group w-full flex items-center gap-1.5 px-2 py-1.5 rounded-lg text-sm transition-colors text-left';
      if (drag)     return `${base} bg-indigo-100 ring-1 ring-indigo-300`;
      if (isActive) return `${base} bg-indigo-50 text-indigo-700 font-medium`;
      return `${base} text-gray-600 hover:bg-gray-100`;
    };

    return (
      <div className="flex gap-3 min-h-0">

        {/* ── Folder sidebar ── */}
        <div className="shrink-0 w-44 flex flex-col gap-0.5">
          <button
            className={folderCls(null, !isFiltering && selectedFolder === null)}
            onDragOver={e => handleDragOver(e, null)}
            onDragLeave={handleDragLeave}
            onDrop={e => handleDrop(e, null)}
            onClick={() => onFolderSelect(null)}>
            <span className="flex-1 truncate">All Notes</span>
            <span className="text-xs text-gray-400 shrink-0">{notes.length}</span>
          </button>

          {folders.length > 0 && <div className="my-1 border-t border-gray-100" />}

          {folders.map(f => (
            <div key={f.id} className="group/row relative">
              {renamingId === f.id ? (
                <input
                  ref={renameRef}
                  className="w-full px-2 py-1.5 text-sm rounded-lg border border-indigo-300 outline-none bg-white"
                  value={renameVal}
                  onChange={e => setRenameVal(e.target.value)}
                  onBlur={commitRename}
                  onKeyDown={e => { if (e.key === 'Enter') commitRename(); if (e.key === 'Escape') setRenamingId(null); }}
                />
              ) : (
                <button
                  className={folderCls(f.id, !isFiltering && selectedFolder === f.id)}
                  onDragOver={e => handleDragOver(e, f.id)}
                  onDragLeave={handleDragLeave}
                  onDrop={e => handleDrop(e, f.id)}
                  onClick={() => onFolderSelect(selectedFolder === f.id ? null : f.id)}>
                  <svg className="shrink-0 w-3.5 h-3.5 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
                  </svg>
                  <span className="flex-1 truncate min-w-0">{f.name}</span>
                  <span className="text-xs text-gray-400 shrink-0 group-hover/row:hidden">{countFor(f.id)}</span>
                  <span className="hidden group-hover/row:flex items-center gap-0.5 shrink-0">
                    <button className="p-0.5 text-gray-400 hover:text-indigo-500 rounded transition-colors" title="Rename"
                      onClick={e => { e.stopPropagation(); setRenamingId(f.id); setRenameVal(f.name); }}>
                      <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15H9v-2z"/>
                      </svg>
                    </button>
                    <button className="p-0.5 text-gray-400 hover:text-red-500 rounded transition-colors" title="Delete folder"
                      onClick={e => { e.stopPropagation(); onDeleteFolder(f.id); }}>
                      <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                      </svg>
                    </button>
                  </span>
                </button>
              )}
            </div>
          ))}

          <button
            className="mt-2 w-full flex items-center gap-1.5 px-2 py-1.5 text-xs text-gray-400 hover:text-indigo-500 hover:bg-gray-50 rounded-lg transition-colors"
            onClick={startAdd}>
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/>
            </svg>
            New Folder
          </button>
        </div>

        {/* ── Notes area ── */}
        <div className="flex-1 min-w-0 space-y-3">
          <div className="flex items-center gap-2 flex-wrap">
            <div className="flex-1 min-w-40 bg-white border border-gray-200 rounded-lg px-3 py-2 flex items-center gap-2">
              <span className="text-gray-300 text-sm select-none">⌕</span>
              <input className="flex-1 text-sm outline-none placeholder-gray-300"
                placeholder="Search notes…" value={search} onChange={e => setSearch(e.target.value)} />
              {search && <button className="text-gray-300 hover:text-gray-500 text-xs" onClick={() => setSearch('')}>✕</button>}
            </div>
          </div>

          {allTags.length > 0 && (
            <div className="flex flex-wrap gap-1.5">
              {allTags.map(t => (
                <button key={t} onClick={() => setFilter(f => f === t ? '' : t)}
                  className={`text-xs px-2.5 py-0.5 rounded-full border transition-colors font-medium ${filterTag === t ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-indigo-500 border-indigo-200 hover:border-indigo-400'}`}>
                  {t}
                </button>
              ))}
            </div>
          )}

          {isFiltering && <p className="text-xs text-gray-400 italic">Showing all matching notes across folders</p>}

          {filtered.length === 0 && (
            <div className="bg-white rounded-xl border border-gray-200 py-16 text-center text-gray-400 text-sm">
              {notes.length === 0 ? 'No notes yet. Click + New Note to start.' : 'No notes match your search.'}
            </div>
          )}

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
            {filtered.map(n => (
              <NoteCard key={n.id} note={n} active={n.id === selectedId} onClick={() => onSelect(n.id)} onDelete={onDelete}
                draggable onDragStart={e => handleDragStart(e, n.id)} onDragEnd={handleDragEnd} />
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ── LinkModal ───────────────────────────────────────────────────────────────
  function LinkModal({ link, onSave, onClose }) {
    const [url, setUrl]        = useState(link?.url || '');
    const [title, setTitle]    = useState(link?.title || '');
    const [desc, setDesc]      = useState(link?.description || '');
    const [tags, setTags]      = useState(link?.tags ?? (link?.tag ? [link.tag] : []));
    const [fetching, setFetch] = useState(false);

    const autoTitle = async () => {
      const u = url.trim(); if (!u) return;
      setFetch(true);
      const { title: t } = await fetchTitle(u.startsWith('http') ? u : 'https://' + u);
      if (t) setTitle(t);
      setFetch(false);
    };

    const submit = () => {
      const u = url.trim(); if (!u) return;
      onSave({ url: u.startsWith('http') ? u : 'https://' + u, title: title.trim(), description: desc.trim(), tags });
    };

    return (
      <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(0,0,0,0.4)' }}
        onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
        <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl">
          <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
            <h2 className="font-semibold text-gray-800">{link ? 'Edit Bookmark' : 'Add Bookmark'}</h2>
            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
          </div>
          <div className="px-6 py-5 space-y-4">
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">URL</label>
              <div className="flex gap-2">
                <input className="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-300"
                  placeholder="https://example.com" value={url} onChange={e => setUrl(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') autoTitle(); }} autoFocus />
                <button onClick={autoTitle} disabled={fetching || !url.trim()}
                  className="shrink-0 text-xs font-semibold px-3 py-2.5 border border-gray-200 rounded-lg text-gray-500 hover:bg-gray-50 disabled:opacity-40 transition-colors">
                  {fetching ? '…' : 'Fetch title'}
                </button>
              </div>
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Title</label>
              <input className="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-300"
                placeholder="Page title" value={title} onChange={e => setTitle(e.target.value)} />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Description</label>
              <textarea className="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-300 resize-none"
                rows={2} placeholder="Optional note…" value={desc} onChange={e => setDesc(e.target.value)} />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Tags</label>
              <div className="border border-gray-200 rounded-lg px-3 py-2 focus-within:border-indigo-300">
                <TagChips tags={tags} onChange={setTags} placeholder="Type and press Enter…" />
              </div>
            </div>
          </div>
          <div className="px-6 py-4 border-t border-gray-100 flex justify-end gap-2">
            <button onClick={onClose} className="text-sm px-4 py-2 text-gray-500 hover:text-gray-700">Cancel</button>
            <button onClick={submit} disabled={!url.trim()}
              className="text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white px-4 py-2 rounded-lg transition-colors">
              {link ? 'Save' : 'Add'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── LinkCard ────────────────────────────────────────────────────────────────
  function LinkCard({ link, onDelete, onEdit }) {
    const domain  = (() => { try { return new URL(link.url).hostname; } catch { return link.url; } })();
    const favicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
    return (
      <div className="group relative bg-white border border-gray-200 rounded-xl p-4 hover:shadow-md hover:border-gray-300 transition-all cursor-pointer"
        onClick={() => openUrl(link.url)}>
        <div className="flex items-start gap-3">
          <img src={favicon} alt="" className="w-5 h-5 rounded mt-0.5 shrink-0" onError={e => { e.target.style.display = 'none'; }} />
          <div className="flex-1 min-w-0">
            <div className="font-medium text-sm text-gray-800 truncate leading-snug">{link.title || domain}</div>
            <div className="text-xs text-indigo-400 truncate mt-0.5">{domain}</div>
            {link.description && <div className="text-xs text-gray-500 mt-1.5 line-clamp-2 leading-relaxed">{link.description}</div>}
            {link.tags?.length > 0 && (
              <div className="flex flex-wrap gap-1 mt-2">
                {link.tags.map(t => <span key={t} className="text-xs bg-indigo-50 text-indigo-600 border border-indigo-100 px-2 py-0.5 rounded-full font-medium">{t}</span>)}
              </div>
            )}
          </div>
        </div>
        <div className="absolute top-2.5 right-2.5 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
          <button onClick={e => { e.stopPropagation(); onEdit(link); }}
            className="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-indigo-600 bg-white border border-gray-200 rounded-md text-xs transition-colors">✎</button>
          <button onClick={e => { e.stopPropagation(); onDelete(link.id); }}
            className="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-red-500 bg-white border border-gray-200 rounded-md text-xs transition-colors">✕</button>
        </div>
      </div>
    );
  }

  // ── QuickAddLink ────────────────────────────────────────────────────────────
  function QuickAddLink({ onAdd }) {
    const [url, setUrl]        = useState('');
    const [fetching, setFetch] = useState(false);
    const submit = async () => {
      const u = url.trim(); if (!u) return;
      const full = u.startsWith('http') ? u : 'https://' + u;
      setFetch(true);
      const { title } = await fetchTitle(full);
      setFetch(false);
      onAdd(full, title);
      setUrl('');
    };
    return (
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm px-4 py-3 flex items-center gap-3">
        <span className="text-gray-300 text-lg select-none shrink-0">🔗</span>
        <input className="flex-1 text-sm outline-none placeholder-gray-300"
          placeholder="Paste a URL and press Enter to save…" value={url}
          onChange={e => setUrl(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') submit(); }} />
        {fetching && <span className="text-xs text-gray-400 shrink-0">Fetching…</span>}
        {!fetching && url.trim() && (
          <button className="text-xs font-semibold text-indigo-500 hover:text-indigo-700 shrink-0" onClick={submit}>Add</button>
        )}
      </div>
    );
  }

  // ── BookmarksTab ────────────────────────────────────────────────────────────
  function BookmarksTab({ links, onAdd, onUpdate, onDelete }) {
    const [search, setSearch]   = useState('');
    const [filterTag, setFilter] = useState('');
    const [modal, setModal]     = useState(null);

    const allTags = useMemo(() =>
      [...new Set(links.flatMap(l => l.tags ?? (l.tag ? [l.tag] : [])))].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' })), [links]);

    const filtered = useMemo(() =>
      links
        .filter(l => !filterTag || (l.tags ?? (l.tag ? [l.tag] : [])).includes(filterTag))
        .filter(l => {
          if (!search) return true;
          const q = search.toLowerCase();
          return (l.title + l.url + (l.description || '') + (l.tags || []).join(' ')).toLowerCase().includes(q);
        })
        .sort((a, b) => (a.title || '').localeCompare(b.title || '')),
      [links, filterTag, search]
    );

    const handleSave = (data) => {
      if (modal && modal !== 'new') onUpdate(modal.id, data); else onAdd(data);
      setModal(null);
    };

    return (
      <div className="space-y-4">
        <QuickAddLink onAdd={(url, title) => onAdd({ url, title, description: '', tags: [] })} />

        <div className="flex items-center gap-2 flex-wrap">
          <div className="flex-1 min-w-40 bg-white border border-gray-200 rounded-lg px-3 py-2 flex items-center gap-2">
            <span className="text-gray-300 text-sm">⌕</span>
            <input className="flex-1 text-sm outline-none placeholder-gray-300" placeholder="Search bookmarks…"
              value={search} onChange={e => setSearch(e.target.value)} />
            {search && <button className="text-gray-300 hover:text-gray-500 text-xs" onClick={() => setSearch('')}>✕</button>}
          </div>
          <button onClick={() => setModal('new')}
            className="text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg transition-colors shadow-sm shrink-0">
            + Add Bookmark
          </button>
        </div>

        {allTags.length > 0 && (
          <div className="flex flex-wrap gap-1.5">
            <button onClick={() => setFilter('')}
              className={`text-xs px-2.5 py-1 rounded-full border font-medium transition-colors ${!filterTag ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>
              All
            </button>
            {allTags.map(t => (
              <button key={t} onClick={() => setFilter(t === filterTag ? '' : t)}
                className={`text-xs px-2.5 py-1 rounded-full border font-medium transition-colors ${filterTag === t ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>
                {t}
              </button>
            ))}
          </div>
        )}

        {filtered.length === 0
          ? <div className="bg-white rounded-xl border border-gray-200 py-16 text-center text-gray-400 text-sm">
              {links.length === 0 ? 'No bookmarks yet. Paste a URL above.' : 'No bookmarks match your search.'}
            </div>
          : <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              {filtered.map(link => <LinkCard key={link.id} link={link} onDelete={onDelete} onEdit={l => setModal(l)} />)}
            </div>
        }

        {modal && <LinkModal link={modal === 'new' ? null : modal} onSave={handleSave} onClose={() => setModal(null)} />}
      </div>
    );
  }

  // ── SecretsTab ───────────────────────────────────────────────────────────────
  function SecretsTab({ secrets, links, onUpdate, onDelete }) {
    const [filterTag, setFilter] = useState('');
    const [selected, setSelected] = useState(null);

    const allTags = useMemo(() =>
      [...new Set(secrets.flatMap(s => s.tags ?? []))].sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' })), [secrets]);

    const filtered = useMemo(() =>
      secrets.filter(s => !filterTag || (s.tags ?? []).includes(filterTag)),
      [secrets, filterTag]);

    const selectedSecret = selected ? secrets.find(s => s.id === selected) : null;

    return (
      <div className="flex gap-4 h-full" style={{minHeight: 0}}>
        {/* list */}
        <div className="flex-1 space-y-3 min-w-0">
          {allTags.length > 0 && (
            <div className="flex flex-wrap gap-1.5">
              <button onClick={() => setFilter('')}
                className={`text-xs px-2.5 py-1 rounded-full border font-medium transition-colors ${!filterTag ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>
                All
              </button>
              {allTags.map(t => (
                <button key={t} onClick={() => setFilter(t === filterTag ? '' : t)}
                  className={`text-xs px-2.5 py-1 rounded-full border font-medium transition-colors ${filterTag === t ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>
                  {t}
                </button>
              ))}
            </div>
          )}
          {filtered.length === 0
            ? <div className="bg-white rounded-xl border border-gray-200 py-16 text-center text-gray-400 text-sm">
                {secrets.length === 0 ? 'No secrets yet. Click "+ New Secret" to add one.' : 'No secrets match this tag.'}
              </div>
            : <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {filtered.map(s => (
                  <SecretCard key={s.id} secret={s}
                    active={selected === s.id}
                    links={links}
                    onClick={() => setSelected(id => id === s.id ? null : s.id)}
                    onDelete={onDelete} />
                ))}
              </div>
          }
        </div>
        {/* detail panel */}
        {selectedSecret && (
          <div className="w-96 shrink-0">
            <SecretDetail secret={selectedSecret} links={links} onUpdate={onUpdate} onClose={() => setSelected(null)} />
          </div>
        )}
      </div>
    );
  }

  function SecretCard({ secret, active, onClick, onDelete, links }) {
    const tagList = secret.tags ?? [];
    const bookmarkLink = secret.bookmark ? (links ?? []).find(l => l.url === secret.bookmark) : null;
    return (
      <div onClick={onClick}
        className={`bg-white rounded-xl border p-4 cursor-pointer transition-all ${active ? 'border-indigo-400 shadow-md' : 'border-gray-200 hover:border-gray-300 hover:shadow-sm'}`}>
        <div className="flex items-start justify-between gap-2">
          <div className="flex items-center gap-2 min-w-0">
            <span className="text-gray-400 shrink-0">
              <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z" clipRule="evenodd"/></svg>
            </span>
            <span className="font-semibold text-gray-800 text-sm truncate">{secret.name || 'Untitled Secret'}</span>
          </div>
          <button onClick={e => { e.stopPropagation(); if (confirm('Delete this secret?')) onDelete(secret.id); }}
            className="shrink-0 text-gray-300 hover:text-red-400 transition-colors text-xs">✕</button>
        </div>
        <div className="mt-2 text-xs text-gray-400">{(secret.items ?? []).length} field{(secret.items ?? []).length !== 1 ? 's' : ''}</div>
        {tagList.length > 0 && (
          <div className="mt-2 flex flex-wrap gap-1">
            {tagList.map(t => <span key={t} className="text-xs bg-indigo-50 text-indigo-600 border border-indigo-100 px-2 py-0.5 rounded-full">{t}</span>)}
          </div>
        )}
        {secret.bookmark && (
          <div className="mt-2">
            <a href={secret.bookmark} onClick={e => { e.stopPropagation(); openUrl(secret.bookmark); e.preventDefault(); }}
              className="text-xs text-indigo-500 hover:underline truncate block">
              {bookmarkLink ? bookmarkLink.title || secret.bookmark : secret.bookmark}
            </a>
          </div>
        )}
      </div>
    );
  }

  function SecretDetail({ secret, links, onUpdate, onClose }) {
    const [name, setName] = useState(secret.name || '');
    const [tags, setTags] = useState((secret.tags ?? []).join(', '));
    const [bookmark, setBookmark] = useState(secret.bookmark || '');
    const [items, setItems] = useState(secret.items ?? []);
    const [revealed, setRevealed] = useState({});

    useEffect(() => {
      setName(secret.name || '');
      setTags((secret.tags ?? []).join(', '));
      setBookmark(secret.bookmark || '');
      setItems(secret.items ?? []);
      setRevealed({});
    }, [secret.id]);

    const save = (patch) => {
      const merged = {
        name: patch.name ?? name,
        tags: patch.tags ?? tags.split(',').map(t => t.trim()).filter(Boolean),
        bookmark: patch.bookmark ?? bookmark,
        items: patch.items ?? items,
      };
      onUpdate(secret.id, merged);
    };

    const updateItem = (idx, field, value) => {
      const next = items.map((it, i) => i === idx ? { ...it, [field]: value } : it);
      setItems(next);
      save({ items: next });
    };

    const addItem = () => {
      const next = [...items, { id: uid(), name: '', value: '' }];
      setItems(next);
      save({ items: next });
    };

    const removeItem = (idx) => {
      const next = items.filter((_, i) => i !== idx);
      setItems(next);
      save({ items: next });
    };

    const copyToClipboard = (text) => {
      navigator.clipboard.writeText(text).catch(() => {});
    };

    return (
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm flex flex-col h-full overflow-hidden">
        {/* header */}
        <div className="shrink-0 px-4 pt-4 pb-3 border-b border-gray-100 flex items-center justify-between">
          <span className="text-sm font-semibold text-gray-700">Secret Details</span>
          <button onClick={onClose} className="text-gray-300 hover:text-gray-500 text-sm transition-colors">✕</button>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-4">
          {/* name */}
          <div>
            <label className="block text-xs font-medium text-gray-500 mb-1">Name</label>
            <input className="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-indigo-400 transition-colors"
              value={name}
              onChange={e => setName(e.target.value)}
              onBlur={() => save({ name })}
              placeholder="Secret name" />
          </div>
          {/* tags */}
          <div>
            <label className="block text-xs font-medium text-gray-500 mb-1">Tags <span className="font-normal text-gray-400">(comma separated)</span></label>

  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // ── SprintViewTab ────────────────────────────────────────────────────────────

    const sprintTasks = useMemo(() =>

    const completedTasks = useMemo(() =>
      sprintTasks.filter(t => getStatus(t) === 'completed')

    const openTasks = useMemo(() =>

    const typeLabels = Object.entries(typeMap).sort((a, b) => b[1] - a[1]).map(([k]) => k);
    const typeData   = typeLabels.map(k => typeMap[k]);
    const typeColors = ['#6366f1','#f97316','#eab308','#10b981','#38bdf8','#e879f9','#f43f5e','#a3e635'];

            <path fillRule="evenodd" d="M15.312 11.424a5.5 5.5 0 01-9.201 2.466l-.312-.311h2.433a.75.75 0 000-1.5H3.989a.75.75 0 00-.75.75v4.242a.75.75 0 001.5 0v-2.43l.31.31a7 7 0 0011.712-3.138.75.75 0 00-1.449-.39zm1.23-3.723a.75.75 0 00.219-.53V2.929a.75.75 0 00-1.5 0V5.36l-.31-.31A7 7 0 003.239 8.188a.75.75 0 101.448.389A5.5 5.5 0 0113.89 6.11l.311.31h-2.432a.75.75 0 000 1.5h4.243a.75.75 0 00.53-.219z" clipRule="evenodd"/>

    return (
      <div className="space-y-5">

        <div className="flex items-center justify-between">

          <select
            value={selectedSprint}
            onChange={e => setSelectedSprint(e.target.value)}
            className="text-sm border border-gray-200 rounded-lg px-3 py-2 bg-white outline-none focus:border-indigo-400 transition-colors">
            <option value="">All Sprints</option>

          </select>
        </div>

        {/* Time by Type doughnut */}
        <div className={cardCls}>
          <div className="flex items-center justify-between mb-3">
            <div className="text-sm font-semibold text-gray-700">Time by Type (actual hrs)</div>
          </div>
          {typeLabels.length === 0
            ? <div className="flex items-center justify-center h-32 text-sm text-gray-400">No actual time logged yet.</div>
            : <div style={{ maxHeight: '300px', maxWidth: '540px', margin: '0 auto' }}>
                <ChartCanvas id="chart-sprint-type" config={{
                type: 'doughnut',
                data: { labels: typeLabels, datasets: [{ data: typeData, backgroundColor: typeColors }] },
                options: {
                  responsive: true, maintainAspectRatio: true,
                  plugins: {
                    legend: {
                      position: 'bottom',
                      labels: {
                        color: '#6b7280', font: { size: 11 }, padding: 16,
                        generateLabels: (chart) => {
                          const ds    = chart.data.datasets[0];
                          const total = ds.data.reduce((a, b) => a + b, 0);
                          return chart.data.labels.map((label, i) => ({
                            text: `${label}  ${ds.data[i].toFixed(1)}h  (${total > 0 ? ((ds.data[i] / total) * 100).toFixed(1) : 0}%)`,
                            fillStyle: ds.backgroundColor[i],
                            strokeStyle: ds.backgroundColor[i],
                            hidden: false, index: i,
                          }));
                        },
                      },
                    },
                    tooltip: {
                      callbacks: {
                        label: (ctx) => {
                          const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                          const pct   = total > 0 ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
                          return ` ${ctx.label}: ${ctx.parsed.toFixed(1)}h (${pct}%)`;
                        },
                      },
                    },
                  },
                },
              }} />
              </div>
          }
        </div>

        {/* Open tasks */}
        <div className={cardCls + ' p-0 overflow-hidden'}>
          <button
            onClick={() => setOpenOpen(v => !v)}
            className="w-full flex items-center justify-between px-5 py-3 text-left hover:bg-gray-50 transition-colors">
            <span className="text-sm font-semibold text-gray-700">
              Open Tasks <span className="ml-1.5 text-xs font-normal text-gray-400">({openTasks.length})</span>

          </button>

            <div className="divide-y divide-gray-100">
              {openTasks.length === 0
                ? <div className="px-5 py-6 text-sm text-gray-400 text-center">No open tasks.</div>
                : openTasks.map(t => <SprintTaskRow key={t.id} task={t} onOpen={onOpen} />)
              }
