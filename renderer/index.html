                  <button onClick={() => updateLk({ editing: true })} className="shrink-0 text-xs text-gray-400 hover:text-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">✎</button>
                  <button onClick={removeLk} className="shrink-0 text-red-300 hover:text-red-500 text-xs opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── StoryEditor ──────────────────────────────────────────────────────────────
  function StoryEditor({ idea, story, onUpdate, onClose }) {
    const saveStory = (fields) => {
      const now = new Date().toISOString();
      onUpdate(idea.id, {
        stories: (idea.stories || []).map(s =>
          s.id === story.id ? { ...s, ...fields, updatedAt: now } : s
        ),
      });
    };

    const sc = STORY_STATUS_CONFIG[story.status] || STORY_STATUS_CONFIG.todo;

    return (
      <div className="space-y-4">
        {/* Header */}
        <div className="flex items-center gap-3">
          <button onClick={onClose}
            className="flex items-center gap-1 text-sm text-gray-400 hover:text-indigo-600 transition-colors shrink-0">
            ← Stories
          </button>
          <input
            className="flex-1 text-base font-semibold bg-transparent border-b border-transparent hover:border-gray-200 focus:border-indigo-400 outline-none text-gray-800 py-0.5 transition-colors"
            value={story.title}
            onChange={e => saveStory({ title: e.target.value })}
            placeholder="Story title"
          />
          <select
            value={story.status}
            onChange={e => saveStory({ status: e.target.value })}
            className={'shrink-0 text-xs font-semibold px-2.5 py-1 rounded-full border outline-none cursor-pointer ' + sc.bg + ' ' + sc.text + ' ' + sc.border}>
            {Object.entries(STORY_STATUS_CONFIG).map(([k, v]) => (
              <option key={k} value={k}>{v.label}</option>
            ))}
          </select>
        </div>

        {/* Description */}
        <ExpandableTextarea
          label="Description"
          value={story.description || ''}
          onChange={e => saveStory({ description: e.target.value })}
          placeholder="Describe the story…"
          rows={4}
        />

        {/* Estimate — always shown. Actual — shown in implementation+ */}
        <div>
          <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Time</label>
          <div className="flex items-center gap-4 flex-wrap">
            <div className="flex items-center gap-2">
              <span className="text-xs text-gray-500">Estimate</span>
              <input type="number" min="0" step="0.5"
                className="w-20 text-sm border border-gray-200 rounded-lg px-2.5 py-1.5 outline-none focus:border-indigo-400 text-center"
                value={story.estimate || ''}
                onChange={e => saveStory({ estimate: e.target.value })}
                placeholder="0" />
              <span className="text-xs text-gray-400">h</span>
              {story.estimate && (
                <span className="text-xs text-gray-400">≈ {Math.ceil(parseFloat(story.estimate) / 8)}d</span>
              )}
            </div>
            {(idea.status === 'implementation' || idea.status === 'released') && (
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-500">Actual</span>
                <input type="number" min="0" step="0.5"
                  className="w-20 text-sm border border-gray-200 rounded-lg px-2.5 py-1.5 outline-none focus:border-indigo-400 text-center"
                  value={story.actualTime || ''}
                  onChange={e => saveStory({ actualTime: e.target.value })}
                  placeholder="0" />
                <span className="text-xs text-gray-400">h</span>
                {story.estimate && story.actualTime && (
                  <span className={'text-xs font-medium ' + (parseFloat(story.actualTime) > parseFloat(story.estimate) ? 'text-red-500' : 'text-green-600')}>
                    {parseFloat(story.actualTime) > parseFloat(story.estimate) ? '+' : ''}
                    {(parseFloat(story.actualTime) - parseFloat(story.estimate)).toFixed(1)}h
                  </span>
                )}
              </div>
            )}
          </div>
          {/* Progress bar for implementation */}
          {(idea.status === 'implementation' || idea.status === 'released') && story.estimate && story.actualTime && (
            <div className="mt-2">
              <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div className={'h-full rounded-full transition-all ' + (parseFloat(story.actualTime) > parseFloat(story.estimate) ? 'bg-red-400' : 'bg-green-400')}
                  style={{ width: Math.min(100, (parseFloat(story.actualTime) / parseFloat(story.estimate)) * 100) + '%' }} />
              </div>
              <div className="text-xs text-gray-400 mt-0.5 text-right">
                {Math.round((parseFloat(story.actualTime) / parseFloat(story.estimate)) * 100)}% used
              </div>
            </div>
          )}
        </div>

        {/* Links */}
        <div>
          <div className="flex items-center justify-between mb-1.5">
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Links</label>
            <button onClick={() => saveStory({ links: [...(story.links || []), { id: uid(), name: '', value: '', editing: true }] })}
              className="text-xs text-indigo-500 hover:text-indigo-700 font-medium">+ Add</button>
          </div>
          {(story.links || []).length === 0 && <p className="text-xs text-gray-400">No links yet.</p>}
          <div className="space-y-1.5">
            {(story.links || []).map((lk, i) => {
              const isUrl = /^https?:\/\//i.test(lk.value);
              const updateLk = (fields) => saveStory({ links: (story.links || []).map((x, j) => j === i ? { ...x, ...fields } : x) });
              const removeLk = () => saveStory({ links: (story.links || []).filter((_, j) => j !== i) });
              if (lk.editing) return (
                <div key={lk.id || i} className="flex items-center gap-2">
                  <input autoFocus className="w-24 shrink-0 text-xs border border-gray-200 rounded-lg px-2 py-1.5 outline-none focus:border-indigo-300 placeholder-gray-300"
                    placeholder="Name" value={lk.name} onChange={e => updateLk({ name: e.target.value })} />
                  <span className="text-gray-300 text-xs shrink-0">:</span>
                  <input className="flex-1 min-w-0 text-xs border border-gray-200 rounded-lg px-2 py-1.5 outline-none focus:border-indigo-300 placeholder-gray-300"
                    placeholder="URL or value" value={lk.value}
                    onChange={e => updateLk({ value: e.target.value })}
                    onKeyDown={e => { if (e.key === 'Enter') updateLk({ editing: false }); }} />
                  <button onClick={() => updateLk({ editing: false })} className="shrink-0 text-xs text-indigo-500 hover:text-indigo-700 font-medium px-1">Done</button>
                  <button onClick={removeLk} className="shrink-0 text-red-300 hover:text-red-500 text-xs">✕</button>
                </div>
              );
              return (
                <div key={lk.id || i} className="flex items-center gap-2 group">
                  {isUrl
                    ? <a href={lk.value} onClick={e => { e.preventDefault(); openUrl(lk.value); }}
                        className="text-sm text-indigo-600 hover:text-indigo-800 hover:underline truncate flex items-center gap-1">
                        {lk.name || lk.value}<span className="text-xs opacity-60">↗</span>
                      </a>
                    : <span className="text-sm text-gray-700 truncate">{lk.name}{lk.value ? ': ' + lk.value : ''}</span>
                  }
                  <button onClick={() => updateLk({ editing: true })} className="shrink-0 text-xs text-gray-400 hover:text-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">✎</button>
                  <button onClick={removeLk} className="shrink-0 text-red-300 hover:text-red-500 text-xs opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                </div>
              );
            })}
          </div>
        </div>

        {/* Dependencies — dropdown + add */}
        <div>
          <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Dependencies</label>
          {/* Added dependency tags */}
          {(story.dependencies || []).length > 0 && (
            <div className="flex flex-wrap gap-1.5 mb-2">
              {(story.dependencies || []).map(did => {
                const dep = (idea.stories || []).find(s => s.id === did);
                if (!dep) return null;
                const sc2 = STORY_STATUS_CONFIG[dep.status] || STORY_STATUS_CONFIG.todo;
                return (
                  <span key={did} className={'flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full ' + sc2.bg + ' ' + sc2.text}>
                    {dep.title || 'Untitled'}
                    <button onClick={() => saveStory({ dependencies: (story.dependencies || []).filter(id => id !== did) })}
                      className="hover:text-red-500 transition-colors leading-none">✕</button>
                  </span>
                );
              })}
            </div>
          )}
          {/* Dropdown to add a new dependency */}
          {(() => {
            const available = (idea.stories || []).filter(s => s.id !== story.id && !(story.dependencies || []).includes(s.id));
            if (available.length === 0) return <p className="text-xs text-gray-400">No other stories available.</p>;
            return (
              <div className="flex items-center gap-2">
                <select
                  defaultValue=""
                  onChange={e => {
                    if (e.target.value) {
                      saveStory({ dependencies: [...(story.dependencies || []), e.target.value] });
                      e.target.value = '';
                    }
                  }}
                  className="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-1.5 outline-none focus:border-indigo-400 bg-white text-gray-600">
                  <option value="" disabled>Select a story to add…</option>
                  {available.map(s => {
                    const sc2 = STORY_STATUS_CONFIG[s.status] || STORY_STATUS_CONFIG.todo;
                    return <option key={s.id} value={s.id}>{sc2.label} — {s.title || 'Untitled'}</option>;
                  })}
                </select>
              </div>
            );
          })()}
        </div>
      </div>
    );
  }

  // ── PlanningTab ──────────────────────────────────────────────────────────────
  const STORY_STATUS_CONFIG = {
    todo:        { label: 'To Do',       bg: 'bg-gray-100',   text: 'text-gray-600',  border: 'border-gray-200' },
    in_progress: { label: 'In Progress', bg: 'bg-blue-100',   text: 'text-blue-700',  border: 'border-blue-200' },
    done:        { label: 'Done',        bg: 'bg-green-100',  text: 'text-green-700', border: 'border-green-200' },
    blocked:     { label: 'Blocked',     bg: 'bg-red-100',    text: 'text-red-700',   border: 'border-red-200'  },
  };

  const IDEA_STATUSES = [
    { key: 'idea',           label: 'Idea',           next: 'design',         nextLabel: '→ Design',         color: 'indigo' },
    { key: 'design',         label: 'Design',         next: 'implementation', nextLabel: '→ Implementation', color: 'amber'  },
    { key: 'implementation', label: 'Implementation', next: 'released',       nextLabel: '→ Released',       color: 'blue'   },
    { key: 'released',       label: 'Released',       next: null,             nextLabel: null,                color: 'green'  },
  ];

  const IDEA_COLOR = {
    indigo: { bg: 'bg-indigo-50', border: 'border-indigo-200', badge: 'bg-indigo-100 text-indigo-700', btn: 'bg-indigo-600 hover:bg-indigo-700 text-white' },
    amber:  { bg: 'bg-amber-50',  border: 'border-amber-200',  badge: 'bg-amber-100 text-amber-700',   btn: 'bg-amber-500 hover:bg-amber-600 text-white'   },
    blue:   { bg: 'bg-blue-50',   border: 'border-blue-200',   badge: 'bg-blue-100 text-blue-700',     btn: 'bg-blue-600 hover:bg-blue-700 text-white'     },
    green:  { bg: 'bg-green-50',  border: 'border-green-200',  badge: 'bg-green-100 text-green-700',   btn: 'bg-green-600 hover:bg-green-700 text-white'   },
  };

  function PlanningTab({ ideas, onAdd, onUpdate, onDelete, onMove, statusKey }) {
    const [editId, setEditId]       = useState(null);
    const [openDoc, setOpenDoc]     = useState(null);   // { ideaId, docId }
    const [addDocFor, setAddDocFor] = useState(null);   // ideaId waiting for template choice
    const [openStory, setOpenStory]   = useState(null);   // { ideaId, storyId }
    const [openDefect, setOpenDefect] = useState(null);   // { ideaId, defectId }
    const cfg   = IDEA_STATUSES.find(s => s.key === statusKey) || IDEA_STATUSES[0];
    const color = IDEA_COLOR[cfg.color];
    const list  = ideas.filter(i => i.status === statusKey)
                       .sort((a, b) => b.createdAt.localeCompare(a.createdAt));

    // Helper: add a new doc and open it
    const createDoc = (ideaId, template) => {
      const idea = ideas.find(i => i.id === ideaId);
      if (!idea) return;
      const newDoc = { id: uid(), title: 'Untitled', template, content: '', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
      onUpdate(ideaId, { docs: [...(idea.docs || []), newDoc] });
      setAddDocFor(null);
      setOpenDoc({ ideaId, docId: newDoc.id });
    };

    // DocViewer mode
    if (openDoc) {
      const idea = ideas.find(i => i.id === openDoc.ideaId);
      const doc  = idea && (idea.docs || []).find(d => d.id === openDoc.docId);
      if (idea && doc) return (
        <DocViewer idea={idea} doc={doc} onUpdate={onUpdate} onClose={() => setOpenDoc(null)}
                   allIdeas={ideas}
                   onDocRef={(iid, did) => setOpenDoc({ ideaId: iid, docId: did })} />
      );
      setOpenDoc(null);
    }

    // StoryEditor mode
    if (openStory) {
      const idea  = ideas.find(i => i.id === openStory.ideaId);
      const story = idea && (idea.stories || []).find(s => s.id === openStory.storyId);
      if (idea && story) return (
        <StoryEditor idea={idea} story={story} onUpdate={onUpdate} onClose={() => setOpenStory(null)} />
      );
      setOpenStory(null);
    }

    // DefectEditor mode
    if (openDefect) {
      const idea   = ideas.find(i => i.id === openDefect.ideaId);
      const defect = idea && (idea.defects || []).find(d => d.id === openDefect.defectId);
      if (idea && defect) return (
        <DefectEditor idea={idea} defect={defect} onUpdate={onUpdate} onClose={() => setOpenDefect(null)} />
      );
      setOpenDefect(null);
    }

    return (
      <div className="space-y-3">
        {/* Add button */}
        <div className="flex justify-end">
          <button onClick={onAdd}
            className={`text-sm font-semibold px-4 py-2 rounded-lg transition-colors shadow-sm ${color.btn}`}>
            + New {cfg.label}
          </button>
        </div>

        {list.length === 0 && (
          <div className={`rounded-xl border ${color.border} ${color.bg} py-16 text-center text-gray-400 text-sm`}>
            No {cfg.label.toLowerCase()} items yet.
          </div>
        )}

        {list.map(idea => (
          <div key={idea.id}
            className={`bg-white rounded-xl border ${editId === idea.id ? 'border-indigo-300 shadow-md' : 'border-gray-200 hover:border-gray-300 hover:shadow-sm'} transition-all`}>
            {editId === idea.id
              ? (
              <div className="p-4 space-y-3">
                  <input
                    autoFocus
                    className="w-full text-sm font-semibold border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-indigo-400"
                    value={idea.title}
                    placeholder="Idea title"
                    onChange={e => onUpdate(idea.id, { title: e.target.value })}
                  />
                  <ExpandableTextarea
                    label="Description"
                    value={idea.description}
                    onChange={e => onUpdate(idea.id, { description: e.target.value })}
                    placeholder="Describe the idea… (Markdown + images supported)"
                    rows={4}
                    withImages={true}
                  />

                  {/* Links */}
                  <div>
                    <div className="flex items-center justify-between mb-1.5">
                      <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Links</label>
                      <button
                        onClick={() => onUpdate(idea.id, { links: [...(idea.links || []), { id: uid(), name: '', value: '', editing: true }] })}
                        className="text-xs text-indigo-500 hover:text-indigo-700 font-medium">
                        + Add
                      </button>
                    </div>
                    {(idea.links || []).length === 0 && (
                      <p className="text-xs text-gray-400">No links yet.</p>
                    )}
                    <div className="space-y-1.5">
                      {(idea.links || []).map((lk, i) => {
                        const isUrl = /^https?:\/\//i.test(lk.value);
                        const updateLk = (fields) => {
                          const updated = (idea.links || []).map((x, j) => j === i ? { ...x, ...fields } : x);
                          onUpdate(idea.id, { links: updated });
                        };
                        const removeLk = () => onUpdate(idea.id, { links: (idea.links || []).filter((_, j) => j !== i) });
                        if (lk.editing) {
                          return (
                            <div key={lk.id || i} className="flex items-center gap-2">
                              <input autoFocus
                                className="w-24 shrink-0 text-xs border border-gray-200 rounded-lg px-2 py-1.5 outline-none focus:border-indigo-300 placeholder-gray-300"
                                placeholder="Name" value={lk.name}
                                onChange={e => updateLk({ name: e.target.value })} />
                              <span className="text-gray-300 text-xs shrink-0">:</span>
                              <input
                                className="flex-1 min-w-0 text-xs border border-gray-200 rounded-lg px-2 py-1.5 outline-none focus:border-indigo-300 placeholder-gray-300"
                                placeholder="URL or value" value={lk.value}
                                onChange={e => updateLk({ value: e.target.value })}
                                onKeyDown={e => { if (e.key === 'Enter') updateLk({ editing: false }); }} />
                              <button onClick={() => updateLk({ editing: false })}
                                className="shrink-0 text-xs text-indigo-500 hover:text-indigo-700 font-medium px-1">Done</button>
                              <button onClick={removeLk}
                                className="shrink-0 text-red-300 hover:text-red-500 text-xs">✕</button>
                            </div>
                          );
                        }
                        return (
                          <div key={lk.id || i} className="flex items-center gap-2 group">
                            {isUrl
                              ? <a href={lk.value} onClick={e => { e.preventDefault(); openUrl(lk.value); }}
                                  className="text-sm text-indigo-600 hover:text-indigo-800 hover:underline truncate flex items-center gap-1">
                                  {lk.name || lk.value}<span className="text-xs opacity-60">↗</span>
                                </a>
                              : <span className="text-sm text-gray-700 truncate">{lk.name}{lk.value ? `: ${lk.value}` : ''}</span>
                            }
                            <button onClick={() => updateLk({ editing: true })}
                              className="shrink-0 text-xs text-gray-400 hover:text-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity ml-auto">✎</button>
                            <button onClick={removeLk}

                                    <button onClick={() => onUpdate(idea.id, { stories: (idea.stories || []).filter(st => st.id !== s.id) })}

                          onUpdate(idea.id, { defects: [...(idea.defects || []), newDef] });

                      </div>

                            {(idea.defects || []).map(d => {

                              const dst = DEFECT_STATUS_CONFIG[d.status]    || DEFECT_STATUS_CONFIG.open;
                              return (
                                <div key={d.id}
                                  onDoubleClick={() => setOpenDefect({ ideaId: idea.id, defectId: d.id })}
                                  className="flex items-center gap-2 group bg-red-50 rounded-lg px-2 py-1.5 border border-red-100 hover:bg-red-100 cursor-pointer transition-colors">
                                  <span className={'text-xs font-medium px-1.5 py-0.5 rounded-full shrink-0 ' + sev.bg + ' ' + sev.text}>{sev.label}</span>
                                  <span className={'text-xs font-medium px-1.5 py-0.5 rounded-full shrink-0 ' + dst.bg + ' ' + dst.text}>{dst.label}</span>
                                  <span className="flex-1 text-xs text-gray-700 truncate">{d.title || 'Untitled'}</span>
                                  <button onClick={() => setOpenDefect({ ideaId: idea.id, defectId: d.id })}
                                    className="shrink-0 text-xs text-indigo-500 hover:text-indigo-700 transition-colors">↗</button>
                                  <button onClick={() => onUpdate(idea.id, { defects: (idea.defects || []).filter(df => df.id !== d.id) })}
                                    className="shrink-0 text-red-300 hover:text-red-500 text-xs transition-colors opacity-0 group-hover:opacity-100">✕</button>
                                </div>
                              );
                            })}
                          </div>
                      }
                    </div>
                  )}

                  <div className="flex items-center justify-between gap-2">
                    <button onClick={() => { if (confirm('Delete this idea?')) { onDelete(idea.id); setEditId(null); } }}
                      className="text-xs text-red-400 hover:text-red-600 transition-colors">
                      Delete

                    <button onClick={() => setEditId(null)}
                      className="text-xs text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
                      Done

              ) : (
                <div className="p-4" onClick={() => setEditId(idea.id)}>
                  <div className="flex items-start justify-between gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-semibold text-gray-800 leading-snug">
                        {idea.title || <span className="text-gray-300 italic">Untitled</span>}
                      </div>
                      {idea.description && (
                        <div className="mt-1 text-xs text-gray-500 line-clamp-2">{idea.description}</div>
                      )}
                      <div className="mt-2 flex items-center gap-3 flex-wrap">
                        <span className="text-xs text-gray-400">{fmtShort(idea.updatedAt || idea.createdAt)}</span>
                        {(idea.links || []).length > 0 && (
                          <span className="text-indigo-400 text-xs">🔗 {idea.links.length} link{idea.links.length !== 1 ? 's' : ''}</span>
                        )}
                        {(idea.docs || []).length > 0 && (
                          <span className="text-amber-500 text-xs">📄 {idea.docs.length} doc{idea.docs.length !== 1 ? 's' : ''}</span>
                        )}
                        {(idea.stories || []).length > 0 && (() => {
                          const stories = idea.stories;
                          const done = stories.filter(s => s.status === 'done').length;
                          const pct  = Math.round((done / stories.length) * 100);

                                <>
                                  <span className="text-gray-300">·</span>
                                  <span className="inline-flex items-center gap-1">
                                    <span className="w-16 h-1.5 bg-gray-100 rounded-full overflow-hidden inline-block">

                        {(idea.defects || []).length > 0 && (() => {

                      {(statusKey === 'implementation' || statusKey === 'released') && (idea.stories || []).length > 0 && (() => {
                        const stories = idea.stories;
                        const done = stories.filter(s => s.status === 'done').length;
                        const inprog = stories.filter(s => s.status === 'in_progress').length;

                      ✓ {cfg.label}
                    </span>

            }
          </div>
        ))}
      </div>

  function CalendarTab({ tasks, onOpen }) {
    const now = new Date();
    const [year,  setYear]   = useState(now.getFullYear());
    const [month, setMonth]  = useState(now.getMonth());
    const [focusId, setFocus] = useState(''); // '' = all root todos

    const prevMonth = () => month === 0  ? (setMonth(11), setYear(y => y - 1)) : setMonth(m => m - 1);
    const nextMonth = () => month === 11 ? (setMonth(0),  setYear(y => y + 1)) : setMonth(m => m + 1);

    const firstDow  = new Date(year, month, 1).getDay();
    const daysInMon = new Date(year, month + 1, 0).getDate();
    const todayStr  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const pad       = (n) => String(n).padStart(2, '0');
    const ds        = (d) => `${year}-${pad(month+1)}-${pad(d)}`;

    // root todos for the dropdown
    const rootTodos = useMemo(() =>
      tasks.filter(t => getStatus(t) !== 'completed' && !t.parentId)
           .sort((a, b) => a.priority - b.priority || (a.title || '').localeCompare(b.title || '')),
    [tasks]);

    // tasks to place on the calendar
    const pool = useMemo(() => {
      const source = focusId
        ? tasks.filter(t => getStatus(t) !== 'completed' && t.parentId === focusId)
        : tasks.filter(t => getStatus(t) !== 'completed' && !t.parentId);
      return source.sort((a, b) => (a.planStartDate || a.planEndDate || 'z').localeCompare(b.planStartDate || b.planEndDate || 'z'));
    }, [tasks, focusId]);

    const scheduled   = useMemo(() => pool.filter(t =>  t.planStartDate || t.planEndDate), [pool]);
    const unscheduled = useMemo(() => pool.filter(t => !t.planStartDate && !t.planEndDate), [pool]);

    // Build week rows
    const weeks = useMemo(() => {
      const cells = [];
      for (let i = 0; i < firstDow; i++) cells.push(null);
      for (let d = 1; d <= daysInMon; d++) cells.push(d);
      while (cells.length % 7 !== 0) cells.push(null);
      const ws = [];
      for (let i = 0; i < cells.length; i += 7) ws.push(cells.slice(i, i + 7));
      return ws;
    }, [firstDow, daysInMon]);

    const weekLayout = (week) => {
      const valid = week.map((d, i) => d ? { d, ds: ds(d), col: i } : null).filter(Boolean);
      if (!valid.length) return [];
      const wStart = valid[0].ds;
      const wEnd   = valid[valid.length - 1].ds;
      return scheduled
        .filter(t => {
          const s = t.planStartDate || t.planEndDate;
          const e = t.planEndDate   || t.planStartDate;
          return s <= wEnd && e >= wStart;
        })
        .map(t => {
          const s = t.planStartDate || t.planEndDate;
          const e = t.planEndDate   || t.planStartDate;
          const startV = valid.find(v => v.ds >= s) || valid[0];
          const endV   = [...valid].reverse().find(v => v.ds <= e) || valid[valid.length - 1];
          return { task: t, colStart: startV.col + 1, colSpan: endV.col - startV.col + 1, isStart: s >= wStart };
        });
    };

    const focusTask = focusId ? tasks.find(t => t.id === focusId) : null;

    return (
      <div className="space-y-3">
        {/* toolbar */}
        <div className="bg-white rounded-xl border border-gray-200 px-4 py-3 flex items-center gap-3 flex-wrap">
          <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide shrink-0">View</span>
          <select
            value={focusId}
            onChange={e => setFocus(e.target.value)}
            className="flex-1 min-w-0 text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:border-indigo-300 bg-white text-gray-700"
          >
            <option value="">All Tasks</option>
            {rootTodos.map(t => (
              <option key={t.id} value={t.id}>{t.title || 'Untitled'}</option>
            ))}
          </select>
          {focusTask && (
            <span className="text-xs text-gray-400 shrink-0">
              Showing sub-tasks of <strong className="text-gray-600">{focusTask.title || 'Untitled'}</strong>
            </span>
          )}
        </div>

        {/* calendar grid */}
        <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
          {/* month nav */}
          <div className="flex items-center justify-between px-5 py-3 border-b border-gray-100">
            <button onClick={prevMonth} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-500 text-xl font-light">‹</button>
            <span className="font-semibold text-gray-800">{MONTH_NAMES[month]} {year}</span>
            <button onClick={nextMonth} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-500 text-xl font-light">›</button>
          </div>

          {/* day-of-week header */}
          <div className="grid grid-cols-7 border-b border-gray-100 bg-gray-50">
            {DAY_NAMES.map(d => (
              <div key={d} className="text-center text-xs font-semibold text-gray-400 py-2">{d}</div>
            ))}
          </div>

          {/* week rows */}
          {weeks.map((week, wi) => {
            const layout = weekLayout(week);
            return (
              <div key={wi} className="border-b border-gray-100">
                <div className="grid grid-cols-7">
                  {week.map((day, di) => {
                    const today = day && ds(day) === todayStr;
                    return (
                      <div key={di} className={`border-r border-gray-100 px-1.5 pt-1.5 pb-0.5 ${today ? 'bg-indigo-50/40' : ''}`}>
                        {day && (
                          <div className={`text-xs font-medium w-6 h-6 flex items-center justify-center rounded-full ${today ? 'bg-indigo-600 text-white' : 'text-gray-500'}`}>
                            {day}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div className="grid grid-cols-7 pb-1.5" style={{ gridAutoFlow: 'row dense', gridAutoRows: '1.375rem' }}>
                  {layout.map(({ task, colStart, colSpan, isStart }) => {
                    const c = BAR_STYLE[task.priority] || BAR_STYLE[3];
                    return (
                      <div key={task.id}
                        style={{
                          gridColumn: `${colStart} / span ${colSpan}`,
                          backgroundColor: c.bg, color: c.text,
                          borderLeft: isStart ? `3px solid ${c.border}` : `3px solid transparent`,
                          borderRadius: isStart ? '4px 2px 2px 4px' : '0 2px 2px 0',
                          marginLeft: isStart ? '3px' : 0, marginRight: '3px',
                        }}
                        onClick={() => onOpen(task.id)}
                        className="my-0.5 px-1.5 text-xs font-medium cursor-pointer truncate flex items-center hover:brightness-95 transition-all"
                      >
                        {isStart ? (task.title || 'Untitled') : ''}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* unscheduled tasks */}
        {unscheduled.length > 0 && (
          <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <div className="px-4 py-2.5 border-b border-gray-100 flex items-center justify-between">
              <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Unscheduled</span>
              <span className="text-xs text-gray-400">{unscheduled.length} task{unscheduled.length !== 1 ? 's' : ''}</span>
            </div>
            <div className="flex flex-wrap gap-2 p-3">
              {unscheduled.map(t => {
                const c = BAR_STYLE[t.priority] || BAR_STYLE[3];
                return (
                  <div key={t.id}
                    style={{ backgroundColor: c.bg, color: c.text, borderLeft: `3px solid ${c.border}` }}
                    onClick={() => onOpen(t.id)}
                    className="text-xs font-medium px-2.5 py-1 rounded cursor-pointer hover:brightness-95 transition-all">
                    {t.title || 'Untitled'}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── RecurringPanel ───────────────────────────────────────────────────────────
  function RecurringPanel({ tmpl, onClose, onSave, onDelete }) {
    const [form, setForm] = useState({ ...tmpl });
    const upd = (key, val) => setForm(f => ({ ...f, [key]: val }));

    const toggleWeekDay = (d) => {
      const days = form.weekDays || [];
      upd('weekDays', days.includes(d) ? days.filter(x => x !== d) : [...days, d]);
    };

    return (
      <div className="fixed inset-0 z-[60] flex items-center justify-center p-8"
        style={{ backgroundColor: 'rgba(0,0,0,0.4)' }}
        onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
        <div onClick={e => e.stopPropagation()} style={{ width: '80vw', height: '100%', maxHeight: 'calc(100vh - 4rem)' }}>
          <div className="slide-panel w-full h-full bg-white shadow-2xl flex flex-col rounded-2xl border border-gray-200 overflow-hidden">

            {/* header */}
            <div className="shrink-0 px-5 pt-4 pb-3 border-b border-gray-100">
              <div className="flex items-start gap-2">
                <input
                  autoFocus
                  className="flex-1 font-semibold text-gray-900 text-base bg-transparent outline-none placeholder-gray-300 leading-snug"
                  value={form.title} onChange={e => upd('title', e.target.value)}
                  placeholder="Recurring task title" />
                <button onClick={onClose} className="shrink-0 text-gray-400 hover:text-gray-600 text-2xl leading-none mt-0.5">×</button>
              </div>
            </div>

            {/* body */}
            <div className="flex-1 overflow-y-auto px-5 py-5 space-y-5">

              {/* Frequency */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Frequency</label>
                <div className="flex gap-2 flex-wrap">
                  {[['daily','Daily'],['weekly','Weekly'],['monthly','Monthly'],['interval','Every N days']].map(([v,l]) => (
                    <button key={v} onClick={() => upd('frequency', v)}
                      className={`px-3 py-1.5 text-xs rounded-lg border font-medium transition-colors ${form.frequency === v ? 'bg-indigo-600 text-white border-indigo-600' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>

              {/* Weekly day picker */}
              {form.frequency === 'weekly' && (
                <div>
                  <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Days of Week</label>
                  <div className="flex gap-2 flex-wrap">
                    {WDAY_NAMES.map((n, i) => (
                      <button key={i} onClick={() => toggleWeekDay(i)}
                        className={`w-10 h-10 text-xs rounded-lg border font-semibold transition-colors ${(form.weekDays||[]).includes(i) ? 'bg-indigo-600 text-white border-indigo-600' : 'border-gray-200 text-gray-500 hover:border-gray-300'}`}>
                        {n}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Monthly day picker */}
              {form.frequency === 'monthly' && (
                <div>
                  <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Day of Month</label>
                  <input type="number" min="1" max="31"
                    className="w-24 text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-300"
                    value={form.monthDay}
                    onChange={e => upd('monthDay', Math.min(31, Math.max(1, parseInt(e.target.value) || 1)))} />
                </div>
              )}

              {/* Interval days */}
              {form.frequency === 'interval' && (
                <div>
                  <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Repeat every N days</label>
                  <input type="number" min="1"
                    className="w-24 text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-300"
                    value={form.intervalDays}
                    onChange={e => upd('intervalDays', Math.max(1, parseInt(e.target.value) || 1))} />
                </div>
              )}

              {/* Priority */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Priority</label>
                <div className="flex gap-1.5 flex-wrap">
                  {PLEVELS.map(p => (
                    <button key={p.v} onClick={() => upd('priority', p.v)}
                      className={`px-3 py-1 text-xs rounded-full border font-semibold transition-colors ${form.priority === p.v ? p.badge + ' ring-2 ' + p.ring : 'border-gray-200 text-gray-400 hover:border-gray-300'}`}>
                      {p.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Type */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Type</label>
                <input
                  className="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-300 placeholder-gray-300"
                  placeholder="e.g. Bug, Feature, Task…"
                  value={form.type || ''} onChange={e => upd('type', e.target.value)} />
              </div>

              {/* Tags */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Tags</label>
                <div className="border border-gray-200 rounded-lg px-3 py-2 focus-within:border-indigo-300">
                  <TagChips tags={form.tags || []} onChange={v => upd('tags', v)} placeholder="Add tags…" />
                </div>
              </div>

              {/* Description */}
              <ExpandableTextarea label="Description" value={form.description}
                onChange={e => upd('description', e.target.value)} placeholder="Task description…" rows={3} withImages />

              {/* Note */}
              <ExpandableTextarea label="Note" value={form.note}
                onChange={e => upd('note', e.target.value)} placeholder="Any notes…" rows={2} withImages />

              {/* Estimate */}
              <div>
                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Estimate (hrs)</label>
                <input type="number" min="0" step="0.5"
                  className="w-32 text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-300"
                  value={form.estimate} onChange={e => upd('estimate', e.target.value)} placeholder="0" />
              </div>

              {/* Sub-tasks */}
              <div>
                <div className="flex items-center justify-between mb-2">
                  <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Sub-tasks</label>
                  <button
                    onClick={() => upd('subtasks', [...(form.subtasks || []), { id: uid(), title: '' }])}
                    className="text-xs text-indigo-500 hover:text-indigo-700 font-medium">+ Add</button>
                </div>
                {!(form.subtasks?.length) && (
                  <p className="text-xs text-gray-400">No sub-tasks configured. Click + Add to define sub-tasks that will be created automatically.</p>
                )}
                <div className="space-y-2">
                  {(form.subtasks || []).map((sub, i) => (
                    <div key={sub.id} className="flex items-center gap-2">
                      <span className="text-gray-300 text-xs shrink-0 select-none">–</span>
                      <input
                        className="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-300 placeholder-gray-300"
                        placeholder="Sub-task title…"
                        value={sub.title}
                        onChange={e => {
                          const updated = (form.subtasks || []).map((s, j) => j === i ? { ...s, title: e.target.value } : s);
                          upd('subtasks', updated);
                        }}
                      />
                      <button onClick={() => upd('subtasks', (form.subtasks || []).filter((_, j) => j !== i))}
                        className="shrink-0 text-red-300 hover:text-red-500 text-xs">✕</button>
                    </div>
                  ))}
                </div>
              </div>

            </div>

            {/* footer */}
            <div className="shrink-0 px-5 py-3 border-t border-gray-100 flex items-center gap-3">
              {onDelete && (
                <button onClick={() => { onDelete(form.id); onClose(); }}
                  className="text-xs text-red-400 hover:text-red-600 border border-red-200 hover:border-red-300 rounded-md px-3 py-1.5 transition-colors">
                  Delete
                </button>
              )}
              <div className="flex gap-2 ml-auto">
                <button onClick={onClose}
                  className="text-sm px-4 py-2 text-gray-500 hover:text-gray-700">Cancel</button>
                <button onClick={() => { onSave(form); onClose(); }} disabled={!form.title?.trim()}
                  className="text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 text-white px-4 py-2 rounded-lg transition-colors">
                  Save
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>
    );
  }

  // ── RecurringTab ─────────────────────────────────────────────────────────────
  function RecurringTab({ recurring, onAdd, onUpdate, onDelete, onToggle, onRun, runMsg }) {
    const [editing, setEditing] = useState(null);

    const handleSave = (data) => {
      if (recurring.find(r => r.id === data.id)) onUpdate(data.id, data);
      else onAdd(data);
      setEditing(null);
    };

    return (
      <div className="space-y-3">
        <div className="flex items-center gap-2 justify-end flex-wrap">
          {runMsg && (
            <span className="text-xs font-medium text-green-600 bg-green-50 border border-green-200 px-3 py-1.5 rounded-lg">{runMsg}</span>
          )}
          <button onClick={onRun}
            className="text-sm font-semibold border border-indigo-300 text-indigo-600 hover:bg-indigo-50 px-4 py-2 rounded-lg transition-colors">
            ▶ Run Now
          </button>
          <button onClick={() => setEditing(makeRecurring())}
            className="text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-colors shadow-sm">
            + Add Recurring Task
          </button>
        </div>

        {recurring.length === 0 && (
          <div className="bg-white rounded-xl border border-gray-200 py-16 text-center text-gray-400 text-sm">
            <div className="text-4xl mb-3 opacity-20">↻</div>
            <div>No recurring tasks yet. Click <strong className="text-gray-500">+ Add Recurring Task</strong> to configure one.</div>
          </div>
        )}

        {recurring.map(tmpl => (
          <div key={tmpl.id} className="bg-white rounded-xl border border-gray-200 px-4 py-3.5 flex items-center gap-4">
            {/* enable toggle */}
            <button onClick={() => onToggle(tmpl.id)} title={tmpl.enabled ? 'Enabled – click to disable' : 'Disabled – click to enable'}
              className={`relative shrink-0 w-10 h-5 rounded-full transition-colors ${tmpl.enabled ? 'bg-indigo-500' : 'bg-gray-200'}`}>
              <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-all ${tmpl.enabled ? 'left-[22px]' : 'left-0.5'}`} />
            </button>

            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                <span className={`font-medium text-sm truncate ${tmpl.enabled ? 'text-gray-800' : 'text-gray-400'}`}>
                  {tmpl.title || <em className="font-normal text-gray-400">Untitled</em>}
                </span>
                <PriorityBadge value={tmpl.priority} />
                {tmpl.type && (
                  <span className="text-xs font-semibold text-violet-600 bg-violet-50 border border-violet-200 px-1.5 py-px rounded-full shrink-0">{tmpl.type}</span>
                )}
              </div>
              <div className="flex items-center gap-3 mt-0.5 flex-wrap">
                <span className="text-xs text-indigo-500 font-medium">{freqSummary(tmpl)}</span>
                {tmpl.lastCreated && (
                  <span className="text-xs text-gray-400">Last created: {fmtDate(tmpl.lastCreated)}</span>
                )}
                {tmpl.tags?.length > 0 && tmpl.tags.map(t => (
                  <span key={t} className="text-xs bg-indigo-50 text-indigo-500 border border-indigo-100 px-1.5 py-px rounded-full">{t}</span>
                ))}
              </div>
            </div>

            <button onClick={() => setEditing(tmpl)}
              className="shrink-0 text-xs text-gray-400 hover:text-indigo-600 border border-gray-200 hover:border-indigo-300 rounded-md px-2.5 py-1.5 transition-colors">
              Edit
            </button>
          </div>
        ))}

        {editing && (
          <RecurringPanel
            tmpl={editing}
            onClose={() => setEditing(null)}
            onSave={handleSave}
            onDelete={onDelete}
          />
        )}
      </div>
    );
  }

  // ── NavItem ─────────────────────────────────────────────────────────────────
  function NavItem({ label, icon, count, active, onClick, indent = false, collapsed = false }) {
    return (
      <button onClick={onClick} title={collapsed ? label : undefined}
        className={`w-full flex items-center gap-2 rounded-lg text-sm transition-colors py-1.5
          ${collapsed ? 'justify-center px-2' : indent ? 'pl-7 pr-3' : 'px-3'}
          ${active ? 'bg-indigo-50 text-indigo-700 font-semibold' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-800'}`}>
        {icon && <span className="shrink-0 w-4 h-4">{icon}</span>}
        {!collapsed && <span className="flex-1 text-left truncate">{label}</span>}
        {!collapsed && count != null && (
          <span className={`text-xs rounded-full px-1.5 py-0.5 min-w-5 text-center ${active ? 'bg-indigo-100 text-indigo-600' : 'bg-gray-100 text-gray-500'}`}>
            {count}
          </span>
        )}
      </button>
    );
  }

  // ── ChartCanvas ──────────────────────────────────────────────────────────────
  function ChartCanvas({ id, config, onDblClick, onClick }) {
    const ref = useRef(null);
    const inst = useRef(null);
    useEffect(() => {
      if (!ref.current) return;
      if (inst.current) inst.current.destroy();
      inst.current = new Chart(ref.current, config);
      return () => { if (inst.current) inst.current.destroy(); };
    }, [JSON.stringify(config)]);

    const handleDblClick = (e) => {
      if (!onDblClick || !inst.current) return;
      const els = inst.current.getElementsAtEventForMode(e.nativeEvent, 'nearest', { intersect: true }, false);
      if (els.length > 0) onDblClick(els[0].index);
    };

    const handleClick = (e) => {
      if (!onClick || !inst.current) return;
      const els = inst.current.getElementsAtEventForMode(e.nativeEvent, 'nearest', { intersect: true }, false);
      if (els.length > 0) onClick(els[0].index);
    };

    return <canvas ref={ref} id={id} onDoubleClick={handleDblClick} onClick={handleClick} style={(onDblClick || onClick) ? { cursor: 'pointer' } : {}} />;
  }

  // ── AnalysisTab ──────────────────────────────────────────────────────────────
  function AnalysisTab({ tasks, onOpenTask }) {
    const [range, setRange]           = useState(30);
    const [customStart, setCustomStart] = useState('');
    const [customEnd, setCustomEnd]   = useState('');
    const [typeModal, setTypeModal]   = useState(null);

    const isCustom = !!(customStart || customEnd);

    // Resolve effective date range
    const todayIso = todayDate();
    const effectiveEnd   = customEnd   || todayIso;
    const effectiveStart = customStart || (() => {
      const d = new Date(effectiveEnd + 'T00:00:00');
      d.setDate(d.getDate() - (range - 1));
      return d.toISOString().slice(0, 10);
    })();

    // Build day array between effectiveStart and effectiveEnd (capped at 400 to keep charts sane)
    const days = useMemo(() => {
      const arr = [];
      const cur = new Date(effectiveStart + 'T00:00:00');
      const end = new Date(effectiveEnd   + 'T00:00:00');
      while (cur <= end && arr.length < 400) {
        arr.push(cur.toISOString().slice(0, 10));
        cur.setDate(cur.getDate() + 1);
      }
      return arr;
    }, [effectiveStart, effectiveEnd]);

    const fmt = (iso) => { const [,m,d] = iso.split('-'); return `${m}/${d}`; };
    const labels = days.map(fmt);

    const allTasks  = tasks.filter(t => !t.parentId);
    const completed = tasks.filter(t => getStatus(t) === 'completed' && t.completedAt);

    // ── Chart 1: Tasks completed per day ──────────────────────────────────────
    const completedPerDay = days.map(d => completed.filter(t => t.completedAt.slice(0, 10) === d).length);

    // ── Chart 2: Tasks created per day ───────────────────────────────────────
    const createdPerDay = days.map(d => allTasks.filter(t => t.createdAt.slice(0, 10) === d).length);

    // ── Chart 3: Estimate vs Actual per day ───────────────────────────────────
    const estimatePerDay = days.map(d =>
      tasks.filter(t => t.completedAt?.slice(0, 10) === d && t.estimate)
           .reduce((s, t) => s + parseFloat(t.estimate || 0), 0));
    const actualPerDay = days.map(d =>
      tasks.filter(t => t.completedAt?.slice(0, 10) === d && t.actualTime)
           .reduce((s, t) => s + parseFloat(t.actualTime || 0), 0));

    // ── Chart 4: Time by type (doughnut) ──────────────────────────────────────
    const typeMap = {};
    tasks.filter(t => t.actualTime && parseFloat(t.actualTime) > 0 && getStatus(t) !== 'skipped').forEach(t => {
      const k = t.type || '(no type)';
      typeMap[k] = (typeMap[k] || 0) + parseFloat(t.actualTime);
    });
    const typeLabels = Object.entries(typeMap).sort((a, b) => b[1] - a[1]).map(([k]) => k);
    const typeData   = typeLabels.map(k => typeMap[k]);
    const typeColors = ['#6366f1','#f97316','#eab308','#10b981','#38bdf8','#e879f9','#f43f5e','#a3e635'];

    // ── Chart 5: Tasks by priority (bar) ─────────────────────────────────────
    const openTasks = tasks.filter(t => !['completed','skipped'].includes(getStatus(t)));
    const byPriority = [1,2,3,4,5].map(p => openTasks.filter(t => t.priority === p).length);

    // ── Metrics ───────────────────────────────────────────────────────────────
    const totalCompleted   = completed.length;
    const completedInRange = completed.filter(t => t.completedAt.slice(0,10) >= effectiveStart && t.completedAt.slice(0,10) <= effectiveEnd).length;
    const totalOpen        = tasks.filter(t => !['completed','skipped'].includes(getStatus(t))).length;
    const overdueCount     = tasks.filter(t => getStatus(t) !== 'completed' && isOverdue(t)).length;
    const totalEstimate    = completed.filter(t => t.estimate).reduce((s,t) => s + parseFloat(t.estimate||0), 0);
    const totalActual      = completed.filter(t => t.actualTime).reduce((s,t) => s + parseFloat(t.actualTime||0), 0);
    const rangeLabel       = isCustom ? 'Done (range)' : `Done (${range}d)`;

    const cardCls = "bg-white rounded-xl border border-gray-200 p-5";
    const COLORS = { grid: '#f3f4f6', text: '#9ca3af', indigo: '#6366f1', green: '#10b981', orange: '#f97316', red: '#ef4444' };

    const baseOpts = (title) => ({
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        title: { display: !!title, text: title, color: '#374151', font: { size: 13, weight: '600' }, padding: { bottom: 12 } },
      },
      scales: {
        x: { grid: { color: COLORS.grid }, ticks: { color: COLORS.text, font: { size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 12 } },
        y: { grid: { color: COLORS.grid }, ticks: { color: COLORS.text, font: { size: 10 }, precision: 0 }, beginAtZero: true },
      },
    });

    return (
      <div className="space-y-5">

        {/* range picker */}
        <div className="bg-white rounded-xl border border-gray-200 px-4 py-3 flex items-center gap-3 flex-wrap">
          <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide shrink-0">Period</span>
          {[7, 14, 30, 60, 90, 365].map(d => (
            <button key={d} onClick={() => { setRange(d); setCustomStart(''); setCustomEnd(''); }}
              className={`text-xs px-3 py-1 rounded-full border font-medium transition-colors ${!isCustom && range === d ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-gray-500 border-gray-200 hover:border-gray-300'}`}>
              {d === 365 ? '1y' : `${d}d`}
            </button>
          ))}
          <span className="text-gray-200 select-none">|</span>
          <div className="flex items-center gap-2 flex-wrap">
            <input type="date" value={customStart} onChange={e => setCustomStart(e.target.value)}
              className={`text-xs border rounded-lg px-2 py-1 focus:outline-none focus:border-indigo-300 ${isCustom ? 'border-indigo-300' : 'border-gray-200'}`} />
            <span className="text-xs text-gray-400 shrink-0">to</span>
            <input type="date" value={customEnd} onChange={e => setCustomEnd(e.target.value)}
              className={`text-xs border rounded-lg px-2 py-1 focus:outline-none focus:border-indigo-300 ${isCustom ? 'border-indigo-300' : 'border-gray-200'}`} />
            {isCustom && (
              <button onClick={() => { setCustomStart(''); setCustomEnd(''); }}
                className="text-xs text-gray-400 hover:text-red-500 transition-colors">✕ Clear</button>
            )}
          </div>
        </div>

        {/* KPI cards */}
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
          {[
            { label: 'Open',           value: totalOpen,          color: 'text-indigo-600' },
            { label: rangeLabel,        value: completedInRange, color: 'text-green-600' },
            { label: 'Total Done',     value: totalCompleted,     color: 'text-gray-700' },
            { label: 'Overdue',        value: overdueCount,       color: 'text-red-500' },
            { label: 'Est. hrs (done)',    value: totalEstimate.toFixed(1), color: 'text-gray-700' },
            { label: 'Actual hrs (done)',  value: totalActual.toFixed(1),   color: 'text-indigo-600' },
          ].map(k => (
            <div key={k.label} className={`${cardCls} text-center`}>
              <div className={`text-2xl font-bold ${k.color}`}>{k.value}</div>
              <div className="text-xs text-gray-400 mt-0.5">{k.label}</div>
            </div>
          ))}
        </div>

        {/* row 1: completed + created */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
          <div className={cardCls}>
            <div className="text-sm font-semibold text-gray-700 mb-3">Tasks Completed per Day</div>
            <ChartCanvas id="chart-completed" config={{
              type: 'bar',
              data: { labels, datasets: [{ data: completedPerDay, backgroundColor: COLORS.indigo, borderRadius: 3 }] },
              options: baseOpts(),
            }} />
          </div>
          <div className={cardCls}>
            <div className="text-sm font-semibold text-gray-700 mb-3">Tasks Created per Day</div>
            <ChartCanvas id="chart-created" config={{
              type: 'bar',
              data: { labels, datasets: [{ data: createdPerDay, backgroundColor: COLORS.green, borderRadius: 3 }] },
              options: baseOpts(),
            }} />
          </div>
        </div>

        {/* row 2: estimate vs actual + type doughnut */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
          <div className={cardCls}>
            <div className="text-sm font-semibold text-gray-700 mb-3">Estimate vs Actual Hours (by completion date)</div>
            <ChartCanvas id="chart-time" config={{
              type: 'bar',
              data: {
                labels,
                datasets: [
                  { label: 'Estimate', data: estimatePerDay, backgroundColor: '#a5b4fc', borderRadius: 3 },
                  { label: 'Actual',   data: actualPerDay,   backgroundColor: COLORS.orange, borderRadius: 3 },
                ],
              },
              options: { ...baseOpts(), plugins: { ...baseOpts().plugins, legend: { display: true, labels: { color: '#6b7280', font: { size: 11 } } } } },
            }} />
          </div>
          <div className={cardCls}>
            <div className="flex items-center justify-between mb-3">
              <div className="text-sm font-semibold text-gray-700">Time by Type (actual hrs)</div>
              {typeLabels.length > 0 && <span className="text-xs text-gray-400">double-click to drill down</span>}
            </div>
            {typeLabels.length === 0
              ? <div className="flex items-center justify-center h-40 text-sm text-gray-400">No actual time logged yet.</div>
              : <ChartCanvas id="chart-type" config={{
                  type: 'doughnut',
                  data: { labels: typeLabels, datasets: [{ data: typeData, backgroundColor: typeColors }] },
                  options: {
                    responsive: true, maintainAspectRatio: true,
                    plugins: {
                      legend: {
                        position: 'right',
                        labels: {
                          color: '#6b7280', font: { size: 11 }, padding: 12,
                          generateLabels: (chart) => {
                            const ds    = chart.data.datasets[0];
                            const total = ds.data.reduce((a, b) => a + b, 0);
                            return chart.data.labels.map((label, i) => ({
                              text: `${label}  ${total > 0 ? ((ds.data[i] / total) * 100).toFixed(1) : 0}%`,
                              fillStyle: ds.backgroundColor[i],
                              strokeStyle: ds.backgroundColor[i],
                              hidden: false, index: i,
                            }));
                          },
                        },
                      },
                      tooltip: {
                        callbacks: {
                          label: (ctx) => {
                            const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                            const pct   = total > 0 ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
                            return ` ${ctx.label}: ${ctx.parsed.toFixed(1)}h (${pct}%)`;
                          },
                        },
                      },
                    },
                  },
                }} onDblClick={idx => setTypeModal(typeLabels[idx])} />
            }
          </div>
        </div>

        {/* row 3: open tasks by priority */}
        <div className={cardCls}>
          <div className="text-sm font-semibold text-gray-700 mb-3">Open Tasks by Priority</div>
          <ChartCanvas id="chart-priority" config={{
            type: 'bar',
            data: {
              labels: ['P1 – Critical','P2 – High','P3 – Medium','P4 – Low','P5 – Minimal'],
              datasets: [{ data: byPriority, backgroundColor: ['#ef4444','#f97316','#eab308','#38bdf8','#d1d5db'], borderRadius: 4 }],
            },
            options: { ...baseOpts(), indexAxis: 'y',
              scales: {
                x: { grid: { color: COLORS.grid }, ticks: { color: COLORS.text, font: { size: 10 }, precision: 0 }, beginAtZero: true },
                y: { grid: { display: false }, ticks: { color: '#374151', font: { size: 11 } } },
              },
            },
          }} />
        </div>

        {/* ── Type drill-down modal ── */}
        {typeModal && (() => {
          const typeTasks = tasks
            .filter(t => (t.type || '(no type)') === typeModal)
            .sort((a, b) => parseFloat(b.actualTime || 0) - parseFloat(a.actualTime || 0));
          const totalAct = typeTasks.reduce((s, t) => s + parseFloat(t.actualTime || 0), 0);
          const totalEst = typeTasks.reduce((s, t) => s + parseFloat(t.estimate   || 0), 0);
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-8"
              style={{ backgroundColor: 'rgba(0,0,0,0.4)' }} onClick={() => setTypeModal(null)}>
              <div className="bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden"
                style={{ width: '640px', maxWidth: '95vw', maxHeight: '80vh' }}
                onClick={e => e.stopPropagation()}>

                {/* header */}
                <div className="shrink-0 px-5 py-4 border-b border-gray-100 flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-gray-800">{typeModal}</div>
                    <div className="text-xs text-gray-400 mt-0.5">
                      {typeTasks.length} task{typeTasks.length !== 1 ? 's' : ''}
                      {totalEst > 0 && <span className="ml-3">Est <span className="font-medium text-gray-600">{totalEst.toFixed(1)}h</span></span>}
                      {totalAct > 0 && <span className="ml-3">Actual <span className="font-medium text-orange-600">{totalAct.toFixed(1)}h</span></span>}
                    </div>
                  </div>
                  <button onClick={() => setTypeModal(null)}
                    className="shrink-0 text-gray-400 hover:text-gray-600 text-2xl leading-none">×</button>
                </div>

                {/* list */}
                <div className="flex-1 overflow-y-auto divide-y divide-gray-100">
                  {typeTasks.length === 0 && (
                    <div className="py-12 text-center text-sm text-gray-400">No tasks for this type.</div>
                  )}
                  {typeTasks.map(t => {
                    const act = parseFloat(t.actualTime || 0);
                    const est = parseFloat(t.estimate   || 0);
                    return (
                      <div key={t.id}
                        onClick={() => { setTypeModal(null); onOpenTask && onOpenTask(t.id); }}
                        className="px-5 py-3 flex items-center gap-3 cursor-pointer hover:bg-gray-50 transition-colors">
                        <StatusBadge status={getStatus(t)} onChange={() => {}} />
                        <div className="flex-1 min-w-0">
                          <div className="text-sm font-medium text-gray-800 truncate">{t.title || 'Untitled'}</div>
                          {t.planEndDate && (
                            <div className="text-xs text-gray-400 mt-0.5">{fmtDate(t.planEndDate)}</div>
                          )}
                        </div>
                        <div className="shrink-0 text-right">
                          {act > 0 && <div className="text-sm font-semibold text-orange-600">{act.toFixed(1)}h actual</div>}
                          {est > 0 && <div className="text-xs text-gray-400">{est.toFixed(1)}h est</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })()}

      </div>
    );
  }

  // ── DynamicViewsTab ──────────────────────────────────────────────────────────
  function DynamicTable({ items, onOpenTask, onOpenNote }) {
    if (!items || items.length === 0) return <p className="text-gray-400 text-sm">No items.</p>;

    const SKIP_COLS = new Set(['_type','id','createdAt','updatedAt','completedAt','planStartDate','description','parentId','links','type','estimate','actualTime','completed']);
    const FIRST_COLS = ['title','name','url'];
    const allKeys = [...new Set(items.flatMap(item => Object.keys(item)))];
    const cols = [
      ...FIRST_COLS.filter(k => allKeys.includes(k)),
      ...allKeys.filter(k => !FIRST_COLS.includes(k) && !SKIP_COLS.has(k)),
    ].slice(0, 7);

    const STATUS_CLS = { ready:'text-gray-400', in_progress:'text-blue-400', paused:'text-yellow-400', completed:'text-green-400', skipped:'text-red-400' };
    const PRI_LABEL  = { 1:'P1', 2:'P2', 3:'P3', 4:'P4', 5:'P5' };
    const PRI_CLS    = { 1:'text-red-400', 2:'text-orange-400', 3:'text-yellow-400', 4:'text-blue-400', 5:'text-gray-400' };

    function renderCell(item, key) {
      const val = item[key];
      if (val === null || val === undefined || val === '') return <span className="text-gray-500">—</span>;
      if (Array.isArray(val)) return val.length ? val.map(t => <span key={t} className="inline-block mr-1 px-1.5 py-0.5 rounded text-xs bg-indigo-500/20 text-indigo-300">{t}</span>) : <span className="text-gray-500">—</span>;
      if (typeof val === 'boolean') return val ? <span className="text-green-400">✓</span> : <span className="text-gray-500">✗</span>;
      if (key === 'status')   return <span className={STATUS_CLS[val] || 'text-gray-300'}>{val}</span>;
      if (key === 'priority') return <span className={PRI_CLS[val] || 'text-gray-300'}>{PRI_LABEL[val] || val}</span>;
      if (key === 'url')      return <a href={val} onClick={e => { e.preventDefault(); openUrl(val); }} className="text-indigo-400 hover:underline truncate block max-w-xs">{val}</a>;
      if (key === 'pinned' && val) return <span className="text-yellow-400">★</span>;
      const str = String(val);
      return <span title={str.length > 60 ? str : undefined}>{str.length > 60 ? str.slice(0,58)+'…' : str}</span>;
    }

    function getType(item) {
      return item._type || (item.status !== undefined ? 'task' : item.url ? 'link' : item.pinned !== undefined ? 'note' : 'custom');
    }

    return (
      <div className="overflow-x-auto rounded-lg border border-gray-200 dark:border-gray-700">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/60">
              {cols.map(col => (
                <th key={col} className="text-left py-2 px-3 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide whitespace-nowrap">
                  {col.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase())}
                </th>
              ))}
              <th className="w-14"></th>
            </tr>
          </thead>
          <tbody>
            {items.map((item, i) => {
              const t = getType(item);
              return (
                <tr key={item.id || i} className="border-b border-gray-100 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors">
                  {cols.map(col => (
                    <td key={col} className="py-2 px-3 max-w-xs">{renderCell(item, col)}</td>
                  ))}
                  <td className="py-2 px-3">
                    {t === 'task' && item.id && <button onClick={() => onOpenTask(item.id)} className="text-xs text-indigo-400 hover:text-indigo-300 font-medium">Open</button>}
                    {t === 'note' && item.id && <button onClick={() => onOpenNote(item.id)} className="text-xs text-indigo-400 hover:text-indigo-300 font-medium">Open</button>}
                    {t === 'link' && item.url && <button onClick={() => openUrl(item.url)} className="text-xs text-indigo-400 hover:text-indigo-300 font-medium">Visit</button>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  }

  // ── SecretsPassphraseSection ─────────────────────────────────────────────────
  function SecretsPassphraseSection() {
    const [hasPassphrase, setHasPassphrase] = React.useState(false);
    const [current, setCurrent]   = React.useState('');
    const [next, setNext]         = React.useState('');
    const [confirm, setConfirm]   = React.useState('');
    const [msg, setMsg]           = React.useState('');
    const [showCurrent, setShowCurrent] = React.useState(false);
    const [showNext, setShowNext]       = React.useState(false);

    React.useEffect(() => {
      fetchSecretsConfig().then(r => r && setHasPassphrase(!!r.hasPassphrase));
    }, []);

    const save = async () => {
      if (next !== confirm) { setMsg('Passphrases do not match.'); return; }
      const res = await fetch('/api/secrets-passphrase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passphrase: next, currentPassphrase: current }),
      }).catch(() => null);
      if (!res) { setMsg('Server error.'); return; }
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setMsg(err.error || 'Failed to update passphrase.');
        return;
      }
      setHasPassphrase(!!next);
      setCurrent(''); setNext(''); setConfirm('');
      setMsg(next ? 'Passphrase saved. Secrets are now encrypted.' : 'Passphrase removed. Secrets stored as plaintext.');
      setTimeout(() => setMsg(''), 4000);
    };

    return (
      <div className="p-4 bg-white rounded-xl border border-gray-200 shadow-sm space-y-3">
        <p className="text-xs text-gray-500">
          {hasPassphrase
            ? 'Secrets are encrypted at rest with AES-256-GCM. Set a new passphrase or clear it to disable encryption.'
            : 'Secrets are stored as plaintext. Set a passphrase to enable AES-256-GCM encryption.'}
        </p>
        {hasPassphrase && (
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Current passphrase</label>
            <div className="flex items-center gap-1">
              <input type={showCurrent ? 'text' : 'password'}
                className="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-indigo-400"
                value={current} onChange={e => setCurrent(e.target.value)} placeholder="Current passphrase" />
              <button onClick={() => setShowCurrent(v => !v)}
                className="shrink-0 text-gray-400 hover:text-gray-600 p-2 transition-colors">
                {showCurrent ? '🙈' : '👁'}
              </button>
            </div>
          </div>
        )}
        <div>
          <label className="block text-xs font-medium text-gray-600 mb-1">New passphrase <span className="font-normal text-gray-400">(leave blank to disable encryption)</span></label>
          <div className="flex items-center gap-1">
            <input type={showNext ? 'text' : 'password'}
              className="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 outline-none focus:border-indigo-400"

  // ── DataFolderSection ─────────────────────────────────────────────────────────
  function DataFolderSection() {
    const [dataDir, setDataDir] = useState('');
    const [input,   setInput]   = useState('');
    const [status,  setStatus]  = useState('');

    useEffect(() => {
      fetch('/api/config').then(r => r.json()).then(d => {
        setDataDir(d.dataDir || '');
        setInput(d.dataDir || '');
      }).catch(() => {});
    }, []);

    async function browse() {
      const chosen = await window.electronAPI?.selectFolder();
      if (chosen) setInput(chosen);
    }

    async function save() {
      if (!input.trim() || input.trim() === dataDir) return;
      try {
        const res  = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ dataDir: input.trim() }) });
        const data = await res.json();
        if (data.error) { setStatus('Error: ' + data.error); return; }
        setDataDir(data.dataDir);
        setInput(data.dataDir);
        setStatus('Saved. New data location is active immediately.');
      } catch (e) { setStatus('Error: ' + e.message); }
      setTimeout(() => setStatus(''), 4000);
    }

    const changed = input.trim() && input.trim() !== dataDir;

    return (
      <section>
        <h3 className="text-xs font-semibold text-gray-700 uppercase tracking-wider mb-3">Data Folder</h3>
        <div className="p-4 bg-white rounded-xl border border-gray-200 shadow-sm space-y-3">
          <p className="text-xs text-gray-500">All tasks, notes, bookmarks, and attachments are stored here.</p>
          <div className="flex gap-2">
            <input value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && save()}
              placeholder="~/path/to/folder"
              className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 min-w-0" />
            {window.electronAPI?.selectFolder && (
              <button onClick={browse} title="Browse"
                className="shrink-0 px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 bg-white hover:bg-gray-100 transition-colors">
                Browse
              </button>
            )}
          </div>
          {changed && (
            <button onClick={save}
              className="w-full py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">
              Save
            </button>
          )}
          {status && <p className="text-xs text-green-600">{status}</p>}
        </div>
      </section>
    );
  }

  function McpServersSection() {
    const [servers, setServers] = useState([]);

    const [newName, setNewName] = useState('');
    const [newUrl, setNewUrl]   = useState('');

    useEffect(() => {
      fetch('/api/mcp').then(r => r.json()).then(d => { if (Array.isArray(d)) setServers(d); }).catch(() => {});
    }, []);

    function save(list) {
      setServers(list);
      apiPost('/api/mcp', list).catch(() => {});
    }

    function toggle(id) {
      save(servers.map(s => s.id === id ? { ...s, enabled: !s.enabled } : s));
    }

    function remove(id) {
      save(servers.filter(s => s.id !== id));
    }

    function add() {
      const name = newName.trim(), url = newUrl.trim();
      if (!name || !url) return;

      setNewName(''); setNewUrl(''); setAdding(false);

                </svg>
              </button>
            </div>
          ))}
        </div>

        {adding && (
          <div className="mt-2 p-3 bg-indigo-50 rounded-xl border border-indigo-200 space-y-2">
            <input value={newName} onChange={e => setNewName(e.target.value)}

            <input value={newUrl} onChange={e => setNewUrl(e.target.value)}
              placeholder="http://localhost:3000/mcp"
