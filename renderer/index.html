  // ── utils ───────────────────────────────────────────────────────────────────
  // Opens a URL in the system browser (Electron shell or browser fallback)
  const openUrl = (url) => {
    if (window.electronAPI?.openExternal) window.electronAPI.openExternal(url);
    else window.open(url, '_blank', 'noopener,noreferrer');
  };

  const shareItem = (title, text) => {
    navigator.clipboard?.writeText(title + '\n\n' + text);
  };

  const uid = () =>
    typeof crypto !== 'undefined' && crypto.randomUUID
      ? crypto.randomUUID()
      : Math.random().toString(36).slice(2) + Date.now().toString(36);

  const fmtDate = (iso) => {
    if (!iso) return '';
    const d = new Date(iso.includes('T') ? iso : iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  };

  const fmtShort = (iso) => {
    if (!iso) return '';
    const d = new Date(iso.includes('T') ? iso : iso + 'T00:00:00');
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60)    return 'just now';
    if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    if (diff < 86400 * 7) return `${Math.floor(diff / 86400)}d ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };

    { v: 1, label: 'P1', dot: 'bg-red-500',    badge: 'bg-red-50 text-red-700 border-red-200',         ring: 'ring-red-300'    },

    { v: 5, label: 'P5', dot: 'bg-gray-300',    badge: 'bg-gray-100 text-gray-500 border-gray-200',      ring: 'ring-gray-300'   },
  ];
  const pconf = (v) => PLEVELS.find(x => x.v === v) || PLEVELS[2];

  // ── storage ─────────────────────────────────────────────────────────────────
  const apiGet  = (path) => fetch(path).then(r => r.json()).catch(() => []);
  const apiPost = (path, data) => fetch(path, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
  }).catch(() => {});

  const fetchTasks = ()    => apiGet('/api/tasks');
  const postTasks  = (t)   => apiPost('/api/tasks', t);
  const fetchLinks = ()    => apiGet('/api/links');
  const postLinks  = (l)   => apiPost('/api/links', l);
  const fetchIdeas = ()    => apiGet('/api/ideas');
  const postIdeas  = (i)   => apiPost('/api/ideas', i);

  const exportData = async (filename, data) => {
    if (window.electronAPI?.exportData) {
      return window.electronAPI.exportData({ filename, data });
    }
    // Web fallback: trigger download
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
    a.click(); URL.revokeObjectURL(a.href);
    return { ok: true };
  };

  const importData = async () => {
    if (window.electronAPI?.importData) {
      return window.electronAPI.importData();
    }
    // Web fallback: file input
    return new Promise((resolve) => {
      const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0]; if (!file) { resolve({ ok: false }); return; }
        const reader = new FileReader();
        reader.onload = ev => { try { resolve({ ok: true, data: JSON.parse(ev.target.result) }); } catch { resolve({ ok: false, error: 'Invalid JSON' }); } };
        reader.readAsText(file);
      };
      input.click();
    });
  };
  const fetchNotes      = ()  => apiGet('/api/notes');
  const postNotes       = (n) => apiPost('/api/notes', n);
  const fetchFolders    = ()  => apiGet('/api/folders');
  const postFolders     = (f) => apiPost('/api/folders', f);
  const fetchRecurring  = ()  => apiGet('/api/recurring');
  const postRecurring   = (r) => apiPost('/api/recurring', r);
  const fetchSecrets    = ()  => apiGet('/api/secrets');
  const postSecrets     = (s) => apiPost('/api/secrets', s);
  const fetchSecretsConfig = () => apiGet('/api/secrets-config');
  const postSecretsPassphrase = (p, c) => apiPost('/api/secrets-passphrase', { passphrase: p, currentPassphrase: c });
  const fetchTitle = (url) =>
    fetch(`/api/fetch-title?url=${encodeURIComponent(url)}`).then(r => r.json()).catch(() => ({ title: '' }));

  // ── factories ───────────────────────────────────────────────────────────────
  const makeTask = (title = '', parentId = null) => ({
    id: uid(), title, description: '', note: '', priority: 3,
    type: '', sprint: '', tags: [], links: [],
    planStartDate: todayDate(), planEndDate: todayDate(), estimate: '', actualTime: '',
    status: 'ready', completed: false, completedAt: null, parentId,
    createdAt: new Date().toISOString(),
  });

  const makeLink = (url = '', title = '') => ({
    id: uid(), url, title, description: '', tags: [],
    createdAt: new Date().toISOString(),
  });

  const makeIdea = (title = '') => ({
    id: uid(), title, description: '', tags: [], links: [], docs: [], stories: [], defects: [],
    status: 'idea',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  });

  const makeSecret = (name = '') => ({
    id: uid(), name, tags: [], bookmark: '',
    items: [{ id: uid(), name: '', value: '' }],
    createdAt: new Date().toISOString(),
  });

  const makeNote = (folderId = null) => ({
    id: uid(), title: '', content: '', tags: [], pinned: false, folderId,
    language: 'markdown',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  });

  const makeFolder = (name = '') => ({
    id: uid(), name, createdAt: new Date().toISOString(),
  });

  const makeRecurring = () => ({
    id: uid(), title: '', description: '', note: '', priority: 3,
    type: '', tags: [], links: [], estimate: '',
    subtasks: [],
    frequency: 'daily',   // 'daily' | 'weekly' | 'monthly' | 'interval'
    weekDays: [1,2,3,4,5], // 0=Sun..6=Sat, used when frequency='weekly'
    monthDay: 1,            // 1..31, used when frequency='monthly'
    intervalDays: 7,        // N, used when frequency='interval'
    enabled: true,
    lastCreated: null,
    createdAt: new Date().toISOString(),
  });

  // ── TagChips (reusable inline chip tag input) ───────────────────────────────
  function TagChips({ tags, onChange, placeholder = 'Add tag…' }) {
    const [input, setInput] = useState('');
    const add = () => {
      const t = input.trim();
      if (t && !tags.includes(t)) onChange([...tags, t]);
      setInput('');
    };
    const remove = (t) => onChange(tags.filter(x => x !== t));
    return (
      <div className="flex flex-wrap gap-1.5 items-center min-h-7">
        {tags.map(t => (
          <span key={t} className="inline-flex items-center gap-1 text-xs bg-indigo-50 text-indigo-600 border border-indigo-100 px-2 py-0.5 rounded-full font-medium">
            {t}
            <button onClick={() => remove(t)} className="hover:text-red-500 leading-none">×</button>
          </span>
        ))}
        <input
          className="text-xs outline-none placeholder-gray-300 flex-1 min-w-20 bg-transparent"
          placeholder={placeholder}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => {
            if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); add(); }
            if (e.key === 'Backspace' && !input && tags.length) remove(tags[tags.length - 1]);
          }}
        />
      </div>
    );
  }

  // ── PriorityBadge ───────────────────────────────────────────────────────────
  function PriorityBadge({ value }) {
    const { label, badge } = pconf(value);
    return <span className={`text-xs px-1.5 py-0.5 rounded border font-semibold ${badge}`}>{label}</span>;
  }

  // ── AddInput (inline add row) ───────────────────────────────────────────────
  function AddInput({ parentId, onAdd, placeholder = 'Add task…' }) {
    const [val, setVal] = useState('');
    const submit = () => { const t = val.trim(); if (!t) return; onAdd(t, parentId); setVal(''); };
    return (
      <div className="flex items-center gap-2 px-4 py-2.5">
        <span className="text-gray-300 text-base select-none">+</span>
        <input
          className="flex-1 text-sm outline-none placeholder-gray-300 bg-transparent"
          placeholder={placeholder}
          value={val}
          onChange={e => setVal(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') setVal(''); }}
        />
        {val.trim() && (
          <button className="text-xs text-indigo-500 hover:text-indigo-700 font-semibold shrink-0" onClick={submit}>Add</button>
        )}
      </div>
    );
  }

  // ── overdue helpers ──────────────────────────────────────────────────────────
  const now0 = () => new Date();
  const todayDate = () => { const d = now0(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
  const isOverdue  = (t) => t.planEndDate && !['completed','skipped'].includes(getStatus(t)) && new Date(t.planEndDate + 'T23:59:59') < now0();
  const isDueToday = (t) => t.planEndDate && !['completed','skipped'].includes(getStatus(t)) && t.planEndDate === todayDate();

  // Recursively find the earliest overdue end-date among all descendants
  const overdueDescendant = (taskId, allTasks) => {
    const children = allTasks.filter(t => t.parentId === taskId && !['completed','skipped'].includes(getStatus(t)));
    let earliest = null;
    for (const c of children) {
      if (isOverdue(c)) {
        if (!earliest || c.planEndDate < earliest) earliest = c.planEndDate;
      }
      const deep = overdueDescendant(c.id, allTasks);
      if (deep && (!earliest || deep < earliest)) earliest = deep;
    }
    return earliest;
  };

  // Returns true if any incomplete descendant is due today
  const dueTodayDescendant = (taskId, allTasks) => {
    const children = allTasks.filter(t => t.parentId === taskId && !['completed','skipped'].includes(getStatus(t)));
    for (const c of children) {
      if (isDueToday(c)) return true;
      if (dueTodayDescendant(c.id, allTasks)) return true;
    }
    return false;
  };

  // ── recurring helpers ────────────────────────────────────────────────────────
  const WDAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const CONFIGURABLE_FIELDS = [
    { key: 'planStartDate', label: 'Start Date' },
    { key: 'planEndDate',   label: 'End Date' },
    { key: 'estimate',      label: 'Estimate' },
    { key: 'actualTime',    label: 'Actual Time' },
  ];
  const DEFAULT_REQUIRED_FIELDS = {
    completed: { planStartDate: true, planEndDate: true, estimate: true, actualTime: true },
  };

  const missingFields = (task, settings, targetStatus = 'completed') => {
    const cfg = settings?.todoRequiredFields ?? DEFAULT_REQUIRED_FIELDS;
    const req = cfg[targetStatus] || {};
    return CONFIGURABLE_FIELDS.filter(f => req[f.key] && !task[f.key]).map(f => f.label);
  };

  const STATUS_REMAP  = { started: 'in_progress', continue: 'in_progress', inprogress: 'in_progress', blocked: 'paused', skip: 'skipped' };
  const STATUS_CONFIG = {
    ready:       { label: 'Ready',       bg: 'bg-gray-100',   text: 'text-gray-600',  dot: 'bg-gray-400',   border: 'border-gray-200'  },
    in_progress: { label: 'In Progress', bg: 'bg-blue-100',   text: 'text-blue-700',  dot: 'bg-blue-500',   border: 'border-blue-200'  },
    paused:      { label: 'Paused',      bg: 'bg-yellow-100', text: 'text-yellow-700',dot: 'bg-yellow-500', border: 'border-yellow-200' },
    skipped:     { label: 'Skipped',     bg: 'bg-gray-100',   text: 'text-gray-400',  dot: 'bg-gray-300',   border: 'border-gray-200'  },
    completed:   { label: 'Completed',   bg: 'bg-green-100',  text: 'text-green-700', dot: 'bg-green-500',  border: 'border-green-200' },
  };
  const ALL_STATUSES = ['ready', 'in_progress', 'paused', 'skipped', 'completed'];
  const getStatus    = (t) => { const s = t.status || (t.completed ? 'completed' : 'ready'); return STATUS_REMAP[s] || s; };

  const freqSummary = (tmpl) => {
    if (tmpl.frequency === 'daily') return 'Every day';
    if (tmpl.frequency === 'weekly') {
      if (!tmpl.weekDays?.length) return 'Weekly (no days selected)';
      return `Weekly on ${[...tmpl.weekDays].sort((a,b)=>a-b).map(d=>WDAY_NAMES[d]).join(', ')}`;
    }
    if (tmpl.frequency === 'monthly') return `Monthly on day ${tmpl.monthDay}`;
    if (tmpl.frequency === 'interval') return `Every ${tmpl.intervalDays} day${tmpl.intervalDays !== 1 ? 's' : ''}`;
    return '';
  };

  const matchesFreq = (tmpl, dateStr) => {
    const d = new Date(dateStr + 'T00:00:00');
    if (tmpl.frequency === 'daily') return true;
    if (tmpl.frequency === 'weekly') return (tmpl.weekDays || []).includes(d.getDay());
    if (tmpl.frequency === 'monthly') return d.getDate() === (tmpl.monthDay || 1);
    if (tmpl.frequency === 'interval') {
      if (!tmpl.lastCreated) return true;
      const last = new Date(tmpl.lastCreated + 'T00:00:00');
      return Math.floor((d - last) / 86400000) >= (tmpl.intervalDays || 7);
    }
    return false;
  };

  const generateRecurringTasks = (recurring, existingTasks, todayStr) => {
    const newTasks = [];
    const updatedRecurring = recurring.map(tmpl => {
      if (!tmpl.enabled || !tmpl.title?.trim()) return tmpl;
      if (tmpl.lastCreated === todayStr) return tmpl;
      if (!matchesFreq(tmpl, todayStr)) return tmpl;
      const expectedTitle = `${tmpl.title.trim()} – ${todayStr}`;
      const exists = existingTasks.some(t => t.title === expectedTitle && !t.completed)
                  || newTasks.some(t => t.title === expectedTitle);
      if (exists) return { ...tmpl, lastCreated: todayStr };
      const mainTask = {
        ...makeTask(expectedTitle),
        description: tmpl.description, note: tmpl.note,
        priority: tmpl.priority, type: tmpl.type,
        tags: [...(tmpl.tags || [])], links: [...(tmpl.links || [])],
        estimate: tmpl.estimate,
        planStartDate: todayStr, planEndDate: todayStr,
      };
      newTasks.push(mainTask);
      for (const sub of (tmpl.subtasks || [])) {
        if (!sub.title?.trim()) continue;
        newTasks.push({
          ...makeTask(sub.title.trim(), mainTask.id),
          type: tmpl.type, tags: [...(tmpl.tags || [])],
          priority: tmpl.priority,
          planStartDate: todayStr, planEndDate: todayStr,
        });
      }
      return { ...tmpl, lastCreated: todayStr };
    });
    return { newTasks, updatedRecurring };
  };

  // ── StatusBadge ─────────────────────────────────────────────────────────────
  function StatusBadge({ status, onChange, blocked = false, getBlocked }) {
    const [open, setOpen] = useState(false);
    const ref = useRef(null);
    const cfg = STATUS_CONFIG[status] || STATUS_CONFIG.ready;

    useEffect(() => {
      if (!open) return;
      const close = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
      document.addEventListener('mousedown', close);
      return () => document.removeEventListener('mousedown', close);
    }, [open]);

    return (
      <div ref={ref} className="relative shrink-0" onClick={e => e.stopPropagation()}>
        <button onClick={() => setOpen(o => !o)}
          className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border ${cfg.bg} ${cfg.text} ${cfg.border}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`} />
          {cfg.label}
        </button>
        {open && (
          <div className="absolute top-full left-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-30 py-1 min-w-[130px]">
            {ALL_STATUSES.map(s => {
              const c = STATUS_CONFIG[s];
              const isBlocked = getBlocked ? getBlocked(s) : (s === 'completed' && blocked);
              return (
                <button key={s} disabled={isBlocked}
                  onClick={() => { if (!isBlocked) { onChange(s); setOpen(false); } }}
                  className={`w-full flex items-center gap-2 px-3 py-1.5 text-xs transition-colors ${isBlocked ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-50'} ${s === status ? 'font-semibold' : ''}`}>
                  <span className={`w-2 h-2 rounded-full shrink-0 ${c.dot}`} />
                  <span className="flex-1 text-left">{c.label}</span>
                  {isBlocked && <span className="text-gray-400 text-xs">fill fields first</span>}
                </button>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // ── TaskRow ─────────────────────────────────────────────────────────────────
  function TaskRow({ task, tasks, onSetStatus, onPriority, onOpen, onDelete, settings }) {
    const subs        = tasks.filter(t => t.parentId === task.id);
    const activeSubs  = subs.filter(t => !['completed','skipped'].includes(getStatus(t)));
    const doneSubs    = subs.filter(t => getStatus(t) === 'completed');
    const hasOpenSubs = activeSubs.length > 0;
    const { dot }     = pconf(task.priority);
    const selfOverdue  = isOverdue(task);
    const selfDueToday = !selfOverdue && isDueToday(task);
    const subOverdue   = !selfOverdue ? overdueDescendant(task.id, tasks) : null;
    const subDueToday  = !selfOverdue && !selfDueToday && !subOverdue ? dueTodayDescendant(task.id, tasks) : false;
    const status   = getStatus(task);
    return (
      <div className="task-row group flex items-center gap-2.5 px-4 py-3 border-b border-gray-100 hover:bg-gray-50 cursor-pointer select-none" onClick={() => onOpen(task.id)}>
        <StatusBadge status={status} onChange={s => onSetStatus(task.id, s)}
          getBlocked={s => (s === 'completed' && hasOpenSubs) || missingFields(task, settings, s).length > 0} />
        <span className={`shrink-0 w-2 h-2 rounded-full ${dot}`} />
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-sm text-gray-800 truncate">{task.title || <em className="text-gray-400">Untitled</em>}</span>
            {task.type && <span className="text-xs font-semibold text-violet-600 bg-violet-50 border border-violet-200 px-1.5 py-px rounded-full shrink-0">{task.type}</span>}
            {selfOverdue  && <span className="text-xs font-semibold text-red-500 bg-red-50 border border-red-200 px-1.5 py-px rounded-full shrink-0">Overdue</span>}
            {selfDueToday && <span className="text-xs font-semibold text-orange-500 bg-orange-50 border border-orange-200 px-1.5 py-px rounded-full shrink-0">Due today</span>}
            {subOverdue   && <span className="text-xs font-semibold text-amber-600 bg-amber-50 border border-amber-200 px-1.5 py-px rounded-full shrink-0" title={`Sub-task overdue since ${fmtDate(subOverdue)}`}>Sub-task overdue</span>}
            {subDueToday  && <span className="text-xs font-semibold text-orange-500 bg-orange-50 border border-orange-200 px-1.5 py-px rounded-full shrink-0">Sub-task due today</span>}
          </div>
          {task.tags?.length > 0 && (
            <div className="flex flex-wrap gap-1 mt-0.5">
              {task.tags.map(t => <span key={t} className="text-xs bg-indigo-50 text-indigo-500 border border-indigo-100 px-1.5 py-px rounded-full">{t}</span>)}
            </div>
          )}
        </div>
        {subs.length > 0 && <span className="text-xs text-gray-400 shrink-0">{doneSubs.length}/{subs.length}</span>}
        {task.planEndDate && <span className={`text-xs shrink-0 hidden sm:block ${selfOverdue ? 'text-red-400 font-medium' : 'text-gray-400'}`}>{fmtDate(task.planEndDate)}</span>}
        <div className="row-actions flex items-center gap-1 shrink-0" onClick={e => e.stopPropagation()}>
          <button onClick={() => onPriority(task.id, -1)} className="text-gray-400 hover:text-gray-700 text-xs px-0.5" title="Higher priority">▲</button>
          <PriorityBadge value={task.priority} />
          <button onClick={() => onPriority(task.id, 1)} className="text-gray-400 hover:text-gray-700 text-xs px-0.5" title="Lower priority">▼</button>
          <button onClick={() => onDelete(task.id)} className="text-red-300 hover:text-red-500 text-xs px-0.5 ml-1">✕</button>
        </div>
      </div>
    );
  }

  // ── CompletedRow ────────────────────────────────────────────────────────────
  function CompletedRow({ task, tasks, onSetStatus, onOpen, onDelete }) {
    const subs    = tasks.filter(t => t.parentId === task.id);
    const doneSubs = subs.filter(t => getStatus(t) === 'completed');
    const est  = parseFloat(task.estimate   || 0);
    const act  = parseFloat(task.actualTime || 0);
    const hasTime = est > 0 || act > 0;
    const over  = est > 0 && act > 0 && act > est;
    const under = est > 0 && act > 0 && act <= est;
    return (
      <div className="task-row group flex items-start gap-3 px-4 py-3.5 border-b border-gray-100 hover:bg-gray-50 cursor-pointer" onClick={() => onOpen(task.id)}>
        <div className="mt-0.5">
          <StatusBadge status="completed" onChange={s => onSetStatus(task.id, s)} />
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-sm text-gray-700 truncate">{task.title || 'Untitled'}</span>
            {task.type && <span className="text-xs font-semibold text-violet-500 bg-violet-50 border border-violet-200 px-1.5 py-px rounded-full shrink-0">{task.type}</span>}
            <PriorityBadge value={task.priority} />
          </div>
          {task.tags?.length > 0 && (
            <div className="flex flex-wrap gap-1 mt-1">
              {task.tags.map(t => <span key={t} className="text-xs bg-indigo-50 text-indigo-500 border border-indigo-100 px-1.5 py-px rounded-full">{t}</span>)}
            </div>
          )}
          {(hasTime || subs.length > 0) && (
            <div className="flex items-center gap-3 mt-1.5 flex-wrap">
              {est > 0 && <span className="text-xs text-gray-400">Est <span className="font-semibold text-gray-600">{est}h</span></span>}
              {act > 0 && <span className="text-xs text-gray-400">Actual <span className={`font-semibold ${over ? 'text-orange-500' : 'text-green-600'}`}>{act}h</span></span>}
              {over  && <span className="text-xs font-medium text-orange-500 bg-orange-50 border border-orange-200 px-1.5 py-px rounded-full">+{((act-est)/est*100).toFixed(0)}% over</span>}
              {under && <span className="text-xs font-medium text-green-600 bg-green-50 border border-green-200 px-1.5 py-px rounded-full">{((est-act)/est*100).toFixed(0)}% under</span>}
              {subs.length > 0 && <span className="text-xs text-gray-300">{doneSubs.length}/{subs.length} sub-tasks</span>}
            </div>
          )}
        </div>
        <div className="row-actions flex items-center gap-1 shrink-0 mt-0.5" onClick={e => e.stopPropagation()}>
          <button onClick={() => onDelete(task.id)} className="text-red-300 hover:text-red-500 text-xs px-0.5">✕</button>
        </div>
      </div>
    );
  }

  // ── SubTaskRow ──────────────────────────────────────────────────────────────
  function SubTaskRow({ task, tasks, onSetStatus, onNavigate, onDelete, settings }) {
    const subs       = tasks.filter(t => t.parentId === task.id);
    const hasOpenSubs = subs.some(t => !['completed','skipped'].includes(getStatus(t)));
    const { dot }    = pconf(task.priority);
    const status     = getStatus(task);
    const isDone     = status === 'completed';
    const selfOverdue  = !isDone && isOverdue(task);
    const selfDueToday = !isDone && !selfOverdue && isDueToday(task);
    const subOverdue   = !isDone && !selfOverdue ? overdueDescendant(task.id, tasks) : null;
    const subDueToday  = !isDone && !selfOverdue && !selfDueToday && !subOverdue ? dueTodayDescendant(task.id, tasks) : false;
    return (
      <div className="task-row group flex items-center gap-2 py-2 border-b border-gray-50 last:border-0">
        <StatusBadge status={status} onChange={s => onSetStatus(task.id, s)}
          getBlocked={s => (s === 'completed' && hasOpenSubs) || missingFields(task, settings, s).length > 0} />
        <span className={`shrink-0 w-1.5 h-1.5 rounded-full ${dot}`} />
        <div className="flex-1 min-w-0 flex items-center gap-1.5 flex-wrap cursor-pointer" onClick={() => onNavigate(task.id)}>
          <span className={`text-sm truncate hover:text-indigo-600 transition-colors ${isDone ? 'line-through text-gray-400' : 'text-gray-700'}`}>
            {task.title || <em className="text-gray-400">Untitled</em>}
          </span>
          {selfOverdue  && <span className="text-xs font-semibold text-red-500 bg-red-50 border border-red-200 px-1.5 py-px rounded-full shrink-0">Overdue</span>}
          {selfDueToday && <span className="text-xs font-semibold text-orange-500 bg-orange-50 border border-orange-200 px-1.5 py-px rounded-full shrink-0">Due today</span>}
          {subOverdue   && <span className="text-xs font-semibold text-amber-600 bg-amber-50 border border-amber-200 px-1.5 py-px rounded-full shrink-0" title={`Sub-task overdue since ${fmtDate(subOverdue)}`}>Sub-task overdue</span>}
          {subDueToday  && <span className="text-xs font-semibold text-orange-500 bg-orange-50 border border-orange-200 px-1.5 py-px rounded-full shrink-0">Sub-task due today</span>}
        </div>
        {subs.length > 0 && <span className="text-xs text-gray-400 shrink-0">{subs.filter(t => getStatus(t) === 'completed').length}/{subs.length}</span>}
        <span className="text-xs text-indigo-400 opacity-0 group-hover:opacity-100 cursor-pointer shrink-0" onClick={() => onNavigate(task.id)}>›</span>
        <div className="row-actions flex items-center shrink-0">
          <button onClick={() => onDelete(task.id)} className="text-red-300 hover:text-red-500 text-xs px-0.5">✕</button>
        </div>
      </div>
    );
  }

  // ── image helpers ────────────────────────────────────────────────────────────

  function setImageWidth(content, imgPathname, width) {
    const esc = imgPathname.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Replace markdown ![alt](path) with <img> tag
    const mdRe = new RegExp(`!\\[([^\\]]*)\\]\\(${esc}\\)`);
    if (mdRe.test(content)) {
      return content.replace(mdRe, (_, alt) =>
        `<img src="${imgPathname}" alt="${alt.replace(/"/g, '&quot;')}" style="width:${width};max-width:100%;border-radius:6px" />`
      );
    }
    // Update existing <img> tag
    const htmlRe = new RegExp(`<img\\b[^>]*\\bsrc=["']${esc}["'][^>]*?/?>`, 'i');
    return content.replace(htmlRe,
      `<img src="${imgPathname}" style="width:${width};max-width:100%;border-radius:6px" />`
    );
  }

  function addImageSizeControls(container, getContent, setContent) {
    container.querySelectorAll('img').forEach(img => {
      if (img.closest('.img-wrap')) return;
      const wrap = document.createElement('span');
      wrap.className = 'img-wrap';
      img.parentNode.insertBefore(wrap, img);
      wrap.appendChild(img);
      const bar = document.createElement('div');
      bar.className = 'img-size-bar';
      ['25%', '50%', '75%', '100%'].forEach(size => {
        const btn = document.createElement('button');
        btn.textContent = size;
        btn.className = 'img-size-btn';
        btn.addEventListener('click', e => {
          e.preventDefault(); e.stopPropagation();
          setContent(setImageWidth(getContent(), new URL(img.src).pathname, size));
        });
        bar.appendChild(btn);
      });
      wrap.appendChild(bar);
    });
  }

  // ── AttachmentsPanel ────────────────────────────────────────────────────────
  function AttachmentsPanel({ entityId, entityType, onInsert }) {
    const [list, setList]         = useState([]);
    const [uploading, setUploading] = useState(false);
    const [lightbox, setLightbox]  = useState(null);
    const [copiedId, setCopiedId]  = useState(null);

    useEffect(() => {
      if (!entityId) return;
      fetch(`/api/attachments?entityId=${encodeURIComponent(entityId)}`)
        .then(r => r.json()).then(d => setList(Array.isArray(d) ? d : [])).catch(() => {});
    }, [entityId]);

    async function upload(file) {
      setUploading(true);
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const r   = await fetch('/api/upload', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: file.name, data: e.target.result, entityId, entityType }),
          });
          const att = await r.json();
          if (att.id) setList(prev => [...prev, att]);
        } catch { /* ignore */ }
        setUploading(false);
      };
      reader.readAsDataURL(file);
    }

    async function remove(id) {
      await fetch('/api/attachments/delete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      setList(prev => prev.filter(a => a.id !== id));
    }

    function handleCopyOrInsert(att) {
      const isImg = att.mime?.startsWith('image/');
      const ref   = isImg ? `![${att.name}](${att.url})` : `[${att.name}](${att.url})`;
      if (onInsert) { onInsert(ref); }
      else { navigator.clipboard?.writeText(ref); }
      setCopiedId(att.id);
      setTimeout(() => setCopiedId(null), 1500);
    }

    function handleDrop(e) {
      e.preventDefault();
      [...(e.dataTransfer.files || [])].forEach(upload);
    }

    const isImg = mime => mime?.startsWith('image/');

    return (
      <>
        <div onDragOver={e => e.preventDefault()} onDrop={handleDrop} className="space-y-2">
          <div className="flex items-center justify-between">
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">
              Attachments{list.length > 0 && <span className="text-gray-400 font-normal normal-case ml-1">({list.length})</span>}
            </label>
            <label className="cursor-pointer text-xs text-indigo-500 hover:text-indigo-700 font-medium transition-colors">
              {uploading ? 'Uploading…' : '+ Attach'}
              <input type="file" multiple className="hidden" onChange={e => [...e.target.files].forEach(upload)} />
            </label>
          </div>

          {list.length === 0
            ? <p className="text-xs text-gray-300 italic py-0.5">No attachments — drag & drop files here or click + Attach.</p>
            : <div className="space-y-1">
                {list.map(att => (
                  <div key={att.id} className="flex items-center gap-2 bg-gray-50 hover:bg-gray-100 rounded-lg px-3 py-2 group transition-colors">
                    {isImg(att.mime)
                      ? <img src={att.url} alt={att.name} onClick={() => setLightbox(att.url)}
                          className="w-9 h-9 object-cover rounded shrink-0 cursor-pointer border border-gray-200" />
                      : <span className="text-base shrink-0">📎</span>
                    }
                    <span className="flex-1 text-xs text-gray-600 truncate" title={att.name}>{att.name}</span>
                    <div className="flex items-center gap-2 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button onClick={() => handleCopyOrInsert(att)}
                        className="text-xs font-medium text-indigo-500 hover:text-indigo-700 transition-colors whitespace-nowrap">
                        {copiedId === att.id ? '✓ Done' : onInsert ? 'Insert' : 'Copy link'}
                      </button>
                      <a href={att.url} download={att.name}
                        className="text-xs text-gray-400 hover:text-gray-600 transition-colors" title="Download">↓</a>
                      <button onClick={() => remove(att.id)}
                        className="text-xs text-red-400 hover:text-red-600 transition-colors" title="Delete">✕</button>
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>

        {lightbox && (
          <div className="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-6"
            onClick={() => setLightbox(null)}>
            <img src={lightbox} alt="" className="max-w-full max-h-full object-contain rounded-lg shadow-2xl" />
            <button className="absolute top-4 right-4 text-white text-3xl leading-none hover:text-gray-300"
              onClick={() => setLightbox(null)}>×</button>
          </div>
        )}
      </>
    );
  }

  // ── ExpandableTextarea ──────────────────────────────────────────────────────
  function ExpandableTextarea({ label, value, onChange, placeholder, rows = 3, withImages = false, taRef: externalTaRef, customPreviewRenderer, onPreviewClick }) {
    const [expanded, setExpanded] = React.useState(false);
    const [mode, setMode]         = React.useState(() => value ? 'preview' : 'edit');
    const internalTaRef = React.useRef(null);
    const taRef         = externalTaRef || internalTaRef;
    const previewRef = React.useRef(null);
    const valueRef   = React.useRef(value);
    React.useEffect(() => { valueRef.current = value; }, [value]);

    const previewHtml = React.useMemo(
      () => mode === 'preview' ? marked.parse(value || '') : '',
      [mode, value]
    );

    React.useEffect(() => {
      if (mode !== 'preview' || !previewRef.current) return;
      addImageSizeControls(
        previewRef.current,
        () => valueRef.current,
        newVal => onChange({ target: { value: newVal } })
      );
      // Render any mermaid diagrams inserted by the custom marked renderer
      if (typeof mermaid !== 'undefined' && previewRef.current.querySelector('.mermaid')) {
        mermaid.run({ nodes: previewRef.current.querySelectorAll('.mermaid') });
      }
    }, [mode, previewHtml]);

    async function uploadAndInsert(file) {
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
          const r   = await fetch('/api/upload', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: safe, data: e.target.result }),
          });
          const { url } = await r.json();
          const ta  = taRef.current;
          const ins = `![${file.name}](${url})`;
          const start = ta ? ta.selectionStart : value.length;
          const newVal = value.slice(0, start) + ins + value.slice(ta ? ta.selectionEnd : start);
          onChange({ target: { value: newVal } });
          setMode('preview');
          setTimeout(() => { if (ta) { ta.focus(); ta.setSelectionRange(start + ins.length, start + ins.length); } }, 0);
        } catch { /* ignore */ }
      };
      reader.readAsDataURL(file);
    }

    function handlePaste(e) {
      if (!withImages) return;
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) { e.preventDefault(); uploadAndInsert(item.getAsFile()); return; }
      }
    }

    const COLLAPSE_SVG = <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 0a.5.5 0 0 1 .5.5v4A1.5 1.5 0 0 1 4.5 6h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5zm5 0a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 10 4.5v-4a.5.5 0 0 1 .5-.5zM0 10.5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 6 11.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zm10 1a1.5 1.5 0 0 1 1.5-1.5h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4z"/></svg>;
    const EXPAND_SVG   = <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 1zm9 0a.5.5 0 0 1 0-1h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 11a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 15.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/></svg>;

    return (
      <div>
        <div className="flex items-center justify-between mb-2">
          <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{label}</label>
          <div className="flex items-center gap-2">
            <div className="flex bg-gray-100 rounded p-0.5 text-xs">
              <button onClick={() => setMode('edit')}
                className={`px-2 py-0.5 rounded transition-colors ${mode === 'edit' ? 'bg-white text-gray-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                Edit
              </button>
              <button onClick={() => setMode('preview')}
                className={`px-2 py-0.5 rounded transition-colors ${mode === 'preview' ? 'bg-white text-gray-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                View
              </button>
            </div>
            {withImages && (
              <label className="cursor-pointer text-gray-400 hover:text-indigo-500 transition-colors" title="Upload image (or paste a screenshot)">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
                  <path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"/>
                </svg>
                <input type="file" accept="image/*" className="hidden" onChange={e => e.target.files[0] && uploadAndInsert(e.target.files[0])} />
              </label>
            )}
            <button onClick={() => setExpanded(ex => !ex)} className="text-gray-400 hover:text-gray-600 transition-colors" title={expanded ? 'Collapse' : 'Expand'}>
              {expanded ? COLLAPSE_SVG : EXPAND_SVG}
            </button>
          </div>
        </div>

        {mode === 'preview' ? (
          <div ref={previewRef}
            className="md-preview w-full min-h-[3.5rem] text-sm border border-gray-200 rounded-lg px-3 py-2.5 text-gray-700"
            dangerouslySetInnerHTML={{
              __html: customPreviewRenderer
                ? (customPreviewRenderer(value) || '<p style="color:#d1d5db;font-style:italic">Nothing to preview.</p>')
                : (previewHtml || '<p style="color:#d1d5db;font-style:italic">Nothing to preview.</p>')
            }}
            onClick={onPreviewClick}
          />
        ) : (
          <textarea
            ref={taRef}
            className="w-full text-sm border border-gray-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-300 resize-y placeholder-gray-300"
            rows={expanded ? 12 : rows}
            value={value}
            onChange={onChange}
            onPaste={handlePaste}
            placeholder={placeholder}
          />
        )}
      </div>
    );
  }

  // ── DetailPanel (task) ──────────────────────────────────────────────────────
  function DetailPanel({ stack, tasks, onClose, onUpdate, onAddTask, onSetStatus, onDelete, onNavigate, onBack, settings }) {
    const [collapsedGroups, setCollapsedGroups] = useState(() => new Set(['completed', 'skipped']));
    const toggleGroup = s => setCollapsedGroups(g => { const n = new Set(g); n.has(s) ? n.delete(s) : n.add(s); return n; });

    if (!stack.length) return null;
    const taskId = stack[stack.length - 1];
    const task   = tasks.find(t => t.id === taskId);
    if (!task) return null;

    const allSubs      = tasks.filter(t => t.parentId === taskId);
    const hasOpenSubs  = allSubs.some(t => !['completed', 'skipped'].includes(getStatus(t)));
    const subsByStatus = ALL_STATUSES.reduce((acc, s) => {
      const group = allSubs.filter(t => getStatus(t) === s)
                           .sort((a, b) => a.priority - b.priority || a.createdAt.localeCompare(b.createdAt));
      if (group.length) acc[s] = group;
      return acc;
    }, {});
    const completedCount = (subsByStatus.completed || []).length;
    const upd     = (key) => (e) => onUpdate(taskId, { [key]: e.target.value });
    const overdue = isOverdue(task);

    return (
      <div className="slide-panel w-full h-full bg-white shadow-2xl flex flex-col rounded-2xl border border-gray-200 overflow-hidden">

              value={task.title} onChange={upd('title')} placeholder="Task title" />
            <button onClick={onClose} className="shrink-0 text-gray-400 hover:text-gray-600 text-2xl leading-none mt-0.5">×</button>
          </div>

        {/* body */}
        <div className="flex-1 overflow-y-auto px-5 py-5 space-y-5">

          {/* Status */}

            <div className="flex items-center gap-3 flex-wrap">
              <StatusBadge status={getStatus(task)} onChange={s => onSetStatus(taskId, s)}
                getBlocked={s => (s === 'completed' && hasOpenSubs) || missingFields(task, settings, s).length > 0} />
              {hasOpenSubs && (
                <span className="text-xs text-amber-600 border border-amber-200 bg-amber-50 rounded-full px-2 py-0.5">

                    <span key={f} className="text-xs font-medium text-red-500 bg-red-50 border border-red-200 px-2 py-0.5 rounded-full">{f}</span>

                const updateLink = (fields) => {

                  onUpdate(taskId, { links: updated });

                const removeLink = () => onUpdate(taskId, { links: (task.links || []).filter((_, j) => j !== i) });
                if (lk.editing) {
                  return (
                    <div key={lk.id || i} className="flex items-center gap-2">
